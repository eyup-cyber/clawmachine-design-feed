<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Logo cloud — Untitled UI Pro</title>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="../design.css">
<style>.logo-cell{display:flex;align-items:center;justify-content:center;color:var(--color-text-quaternary);font-weight:600;letter-spacing:0.02em;}</style>
</head>
<body>

<!-- default dense row -->
<section class="uui-container" style="padding:96px 32px 32px;text-align:center;">
  <p style="font-size:var(--text-md);color:var(--color-text-tertiary);font-weight:500;">Join 4,000+ teams using Untitled UI</p>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:32px;margin-top:40px;">
    <div class="logo-cell">ACME CO</div>
    <div class="logo-cell">VERTEX</div>
    <div class="logo-cell">NOVA</div>
    <div class="logo-cell">PARABOLA</div>
    <div class="logo-cell">STRATA</div>
    <div class="logo-cell">COUNTERPOINT</div>
  </div>
</section>

<!-- variant: monogram badge row -->
<section class="uui-container" style="padding:64px 32px;text-align:center;background:var(--color-bg-secondary);">
  <h3 style="font-size:var(--text-display-xs);font-weight:600;color:var(--color-text-primary);">Trusted by design teams at</h3>
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:24px;margin-top:40px;">
    <div style="aspect-ratio:1;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--color-fg-secondary);">A</div>
    <div style="aspect-ratio:1;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--color-fg-secondary);">B</div>
    <div style="aspect-ratio:1;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--color-fg-secondary);">C</div>
    <div style="aspect-ratio:1;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--color-fg-secondary);">D</div>
    <div style="aspect-ratio:1;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--color-fg-secondary);">E</div>
    <div style="aspect-ratio:1;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--color-fg-secondary);">F</div>
    <div style="aspect-ratio:1;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--color-fg-secondary);">G</div>
    <div style="aspect-ratio:1;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--color-fg-secondary);">H</div>
  </div>
</section>

<!-- variant: marquee scroll (static, CSS-animated) -->
<section style="padding:64px 0;overflow:hidden;">
  <p style="font-size:var(--text-sm);color:var(--color-text-tertiary);text-align:center;margin-bottom:32px;">Featured in</p>
  <div class="uui-marquee" style="display:flex;gap:64px;animation:uui-scroll 30s linear infinite;width:max-content;">
    <div class="logo-cell" style="padding:0 32px;">ACME</div>
    <div class="logo-cell" style="padding:0 32px;">VERTEX</div>
    <div class="logo-cell" style="padding:0 32px;">NOVA</div>
    <div class="logo-cell" style="padding:0 32px;">PARABOLA</div>
    <div class="logo-cell" style="padding:0 32px;">STRATA</div>
    <div class="logo-cell" style="padding:0 32px;">COUNTERPOINT</div>
    <div class="logo-cell" style="padding:0 32px;">HELIX</div>
    <div class="logo-cell" style="padding:0 32px;">OKTA</div>
    <div class="logo-cell" style="padding:0 32px;">MERIDIAN</div>
    <div class="logo-cell" style="padding:0 32px;">PHOSPHOR</div>
    <div class="logo-cell" style="padding:0 32px;">ACME</div>
    <div class="logo-cell" style="padding:0 32px;">VERTEX</div>
    <div class="logo-cell" style="padding:0 32px;">NOVA</div>
  </div>
  <style>@keyframes uui-scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}</style>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>File Upload — Untitled UI Pro</title>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css"><link rel="stylesheet" href="../design.css">
</head>
<body>
<main class="uui-container showcase">
  <h2>File upload</h2>
  <p class="lead">Dropzone, list with per-file progress, error row, completed row.</p>

  <section class="uui-stack gap-6" style="max-width:600px;">

    <label style="display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px;text-align:center;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);cursor:pointer;">
      <span class="uui-ficon uui-ficon--md uui-ficon--gray-light" style="box-shadow:0 0 0 1px var(--color-border-secondary),0 0 0 6px var(--color-bg-secondary);">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><path d="M14.17 14.17 10 10 5.83 14.17M10 10v9.17M17.15 15.48a4.58 4.58 0 0 0-2.19-8.6l-1.05-.01a7.08 7.08 0 1 0-12.15 6.45"/></svg>
      </span>
      <div>
        <span style="font-size:var(--text-sm);color:var(--color-text-brand-secondary);font-weight:600;">Click to upload</span>
        <span style="font-size:var(--text-sm);color:var(--color-text-tertiary);"> or drag and drop</span>
      </div>
      <div style="font-size:var(--text-xs);color:var(--color-text-tertiary);">SVG, PNG, JPG or GIF (max. 800x400px)</div>
    </label>

    <!-- list -->
    <div style="background:var(--color-bg-primary);border-radius:var(--radius-xl);box-shadow:inset 0 0 0 1px var(--color-border-secondary);padding:16px;display:flex;gap:12px;">
      <span class="uui-ficon uui-ficon--md" style="background:var(--color-bg-brand-primary);color:var(--color-text-brand-secondary);flex-shrink:0;">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><path d="M11.67 1.89H5a1.67 1.67 0 0 0-1.67 1.67V16.44a1.67 1.67 0 0 0 1.67 1.67h10a1.67 1.67 0 0 0 1.67-1.67v-9.88z"/><path d="M11.67 1.89v5h5"/></svg>
      </span>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;">
          <span style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">brand-guidelines.pdf</span>
          <button class="uui-btn uui-btn--tertiary uui-btn--sm" style="padding:0;" aria-label="delete">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="var(--color-fg-quaternary)" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 5h15M8.33 9.17v5M11.67 9.17v5M3.33 5 4.17 15a1.67 1.67 0 0 0 1.67 1.67h8.33A1.67 1.67 0 0 0 15.83 15L16.67 5M6.67 5V3.33A1.67 1.67 0 0 1 8.33 1.67h3.34A1.67 1.67 0 0 1 13.33 3.33V5"/></svg>
          </button>
        </div>
        <div style="font-size:var(--text-sm);color:var(--color-text-tertiary);">1.2 MB — 100% uploaded</div>
        <div class="uui-row gap-3 items-center" style="margin-top:8px;">
          <div class="uui-progress" style="flex:1;"><span style="width:100%;"></span></div>
          <span style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">100%</span>
        </div>
      </div>
    </div>

    <div style="background:var(--color-bg-primary);border-radius:var(--radius-xl);box-shadow:inset 0 0 0 1px var(--color-border-secondary);padding:16px;display:flex;gap:12px;">
      <span class="uui-ficon uui-ficon--md" style="background:var(--color-bg-brand-primary);color:var(--color-text-brand-secondary);flex-shrink:0;">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><path d="M11.67 1.89H5a1.67 1.67 0 0 0-1.67 1.67V16.44a1.67 1.67 0 0 0 1.67 1.67h10a1.67 1.67 0 0 0 1.67-1.67v-9.88z"/><path d="M11.67 1.89v5h5"/></svg>
      </span>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;">
          <span style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">tech-design-specs.fig</span>
          <button class="uui-btn uui-btn--tertiary uui-btn--sm" style="padding:0;" aria-label="cancel">Cancel</button>
        </div>
        <div style="font-size:var(--text-sm);color:var(--color-text-tertiary);">3.4 MB — uploading</div>
        <div class="uui-row gap-3 items-center" style="margin-top:8px;">
          <div class="uui-progress" style="flex:1;"><span style="width:62%;"></span></div>
          <span style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">62%</span>
        </div>
      </div>
    </div>

    <div style="background:var(--color-bg-error-primary);border-radius:var(--radius-xl);box-shadow:inset 0 0 0 1px var(--color-error-200);padding:16px;display:flex;gap:12px;">
      <span class="uui-ficon uui-ficon--md uui-ficon--error-light" style="background:white;flex-shrink:0;">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="8.33"/><path d="M12.5 7.5 7.5 12.5M7.5 7.5l5 5"/></svg>
      </span>
      <div style="flex:1;">
        <div style="display:flex;justify-content:space-between;">
          <span style="font-size:var(--text-sm);font-weight:500;color:var(--color-error-700);">dashboard-backup.zip</span>
          <button class="uui-btn uui-btn--link-destructive uui-btn--sm">Try again</button>
        </div>
        <div style="font-size:var(--text-sm);color:var(--color-error-600);">Upload failed — file too large (max 10MB)</div>
      </div>
    </div>

  </section>
</main>
</body>
</html>

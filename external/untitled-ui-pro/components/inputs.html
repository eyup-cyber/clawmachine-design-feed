<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inputs — Untitled UI Pro</title>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="../design.css">
</head>
<body>
<main class="uui-container showcase">
  <h2>Inputs</h2>
  <p class="lead">Text, email, password, search, textarea, with-icon, with-addon, error, disabled.</p>

  <div class="grid" style="grid-template-columns:repeat(2,minmax(0,1fr));gap:24px;max-width:720px;">

    <div class="uui-input-wrap">
      <label class="uui-label">Email <span class="req">*</span></label>
      <div class="uui-input">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><rect x="1.67" y="4.17" width="16.67" height="11.67" rx="1.67"/><path d="m1.67 5.83 7.37 5.16a1.67 1.67 0 0 0 1.91 0l7.38-5.16"/></svg>
        <input type="email" placeholder="olivia@untitledui.com">
      </div>
      <p class="uui-hint">This is a hint text to help user.</p>
    </div>

    <div class="uui-input-wrap">
      <label class="uui-label">Website</label>
      <div class="uui-input" style="padding-left:0;">
        <span style="padding:10px 14px 10px 14px;color:var(--color-text-tertiary);font-size:var(--text-md);border-right:1px solid var(--color-border-primary);">https://</span>
        <input type="text" placeholder="www.untitledui.com" style="padding-left:0;">
      </div>
    </div>

    <div class="uui-input-wrap">
      <label class="uui-label">Search</label>
      <div class="uui-input">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><circle cx="9.17" cy="9.17" r="7.5"/><path d="m17.5 17.5-3.62-3.62"/></svg>
        <input type="search" placeholder="Search">
      </div>
    </div>

    <div class="uui-input-wrap">
      <label class="uui-label">Invalid state</label>
      <div class="uui-input is-invalid">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><rect x="1.67" y="4.17" width="16.67" height="11.67" rx="1.67"/><path d="m1.67 5.83 7.37 5.16a1.67 1.67 0 0 0 1.91 0l7.38-5.16"/></svg>
        <input type="email" value="olivia@untitledu" >
        <svg viewBox="0 0 20 20" fill="none" stroke="var(--color-error-500)" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="8.33"/><path d="M10 6.67v3.33M10 13.33h.01"/></svg>
      </div>
      <p class="uui-hint is-invalid">This is an error message.</p>
    </div>

    <div class="uui-input-wrap" style="grid-column:1/-1;">
      <label class="uui-label">Description</label>
      <div class="uui-input" style="align-items:flex-start;min-height:128px;">
        <textarea rows="4" placeholder="Enter a description..."></textarea>
      </div>
      <p class="uui-hint">275 characters left.</p>
    </div>

    <div class="uui-input-wrap">
      <label class="uui-label">Password</label>
      <div class="uui-input">
        <input type="password" value="password123" >
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><path d="M.83 10S4.17 3.33 10 3.33 19.17 10 19.17 10 15.83 16.67 10 16.67.83 10 .83 10Z"/><circle cx="10" cy="10" r="2.5"/></svg>
      </div>
    </div>

    <div class="uui-input-wrap">
      <label class="uui-label">Disabled</label>
      <div class="uui-input is-disabled">
        <input type="text" value="olivia@untitledui.com" disabled>
      </div>
    </div>

    <!-- sizes -->
    <div class="uui-input-wrap" style="grid-column:1/-1;margin-top:24px;">
      <label class="uui-label">Sizes: sm / md / lg</label>
      <div class="uui-input uui-input--sm"><input placeholder="Small input"></div>
      <div class="uui-input"><input placeholder="Medium input"></div>
      <div class="uui-input uui-input--lg"><input placeholder="Large input"></div>
    </div>

    <!-- pin -->
    <div class="uui-input-wrap" style="grid-column:1/-1;">
      <label class="uui-label">2FA Pin</label>
      <div class="uui-row gap-2">
        <div class="uui-input uui-input--lg" style="width:64px;justify-content:center;"><input maxlength="1" style="width:24px;text-align:center;font-size:36px;line-height:44px;font-weight:500;" value="0"></div>
        <div class="uui-input uui-input--lg" style="width:64px;justify-content:center;"><input maxlength="1" style="width:24px;text-align:center;font-size:36px;line-height:44px;font-weight:500;"></div>
        <div class="uui-input uui-input--lg" style="width:64px;justify-content:center;"><input maxlength="1" style="width:24px;text-align:center;font-size:36px;line-height:44px;font-weight:500;"></div>
        <span style="align-self:center;color:var(--color-fg-quaternary);font-size:var(--text-display-md);">-</span>
        <div class="uui-input uui-input--lg" style="width:64px;justify-content:center;"><input maxlength="1" style="width:24px;text-align:center;font-size:36px;line-height:44px;font-weight:500;"></div>
        <div class="uui-input uui-input--lg" style="width:64px;justify-content:center;"><input maxlength="1" style="width:24px;text-align:center;font-size:36px;line-height:44px;font-weight:500;"></div>
        <div class="uui-input uui-input--lg" style="width:64px;justify-content:center;"><input maxlength="1" style="width:24px;text-align:center;font-size:36px;line-height:44px;font-weight:500;"></div>
      </div>
    </div>

  </div>
</main>
</body>
</html>

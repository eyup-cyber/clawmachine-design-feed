<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Forgot password — Untitled UI Pro</title>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css"><link rel="stylesheet" href="../design.css">
</head>
<body>
<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px;">
  <div style="width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:32px;">
      <span class="uui-ficon uui-ficon--lg uui-ficon--outline" style="margin:0 auto;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <h1 class="t-display-xs" style="font-weight:600;color:var(--color-text-primary);margin-top:24px;">Forgot password?</h1>
      <p style="font-size:var(--text-md);color:var(--color-text-tertiary);margin-top:12px;">No worries, we'll send you reset instructions.</p>
    </div>

    <form style="display:flex;flex-direction:column;gap:20px;">
      <div class="uui-input-wrap">
        <label class="uui-label">Email</label>
        <div class="uui-input"><input type="email" placeholder="Enter your email"></div>
      </div>
      <button type="submit" class="uui-btn uui-btn--primary uui-btn--lg" style="width:100%;">Reset password</button>
    </form>

    <p style="text-align:center;margin-top:32px;">
      <a href="sign-in.html" class="uui-btn uui-btn--link-gray uui-btn--sm" style="font-weight:600;">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><path d="M15.83 10H4.17M10 15.83 4.17 10 10 4.17"/></svg>
        Back to log in
      </a>
    </p>
  </div>
</main>
</body>
</html>

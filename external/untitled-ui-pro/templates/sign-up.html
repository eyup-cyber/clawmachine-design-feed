<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Sign up — Untitled UI Pro</title>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css"><link rel="stylesheet" href="../design.css">
</head>
<body>
<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px;background:var(--color-bg-secondary);">
  <div style="width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:32px;">
      <span class="uui-ficon uui-ficon--lg" style="margin:0 auto;background:linear-gradient(135deg,var(--color-brand-400),var(--color-brand-700));color:#fff;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <h1 class="t-display-xs" style="font-weight:600;color:var(--color-text-primary);margin-top:24px;">Create an account</h1>
      <p style="font-size:var(--text-md);color:var(--color-text-tertiary);margin-top:12px;">Start your 30-day free trial.</p>
    </div>

    <form style="display:flex;flex-direction:column;gap:20px;">
      <div class="uui-input-wrap">
        <label class="uui-label">Name</label>
        <div class="uui-input"><input placeholder="Enter your name"></div>
      </div>
      <div class="uui-input-wrap">
        <label class="uui-label">Email</label>
        <div class="uui-input"><input type="email" placeholder="Enter your email"></div>
      </div>
      <div class="uui-input-wrap">
        <label class="uui-label">Password</label>
        <div class="uui-input"><input type="password" placeholder="Create a password"></div>
        <p class="uui-hint">Must be at least 8 characters.</p>
      </div>
      <button type="submit" class="uui-btn uui-btn--primary uui-btn--lg" style="width:100%;">Get started</button>
      <button type="button" class="uui-btn uui-btn--secondary uui-btn--lg" style="width:100%;">
        <svg width="20" height="20" viewBox="0 0 20 20"><path fill="#4285F4" d="M19.6 10.23c0-.74-.06-1.45-.17-2.14H10v4.05h5.39a4.6 4.6 0 0 1-2 3.03v2.52h3.24c1.9-1.74 2.97-4.3 2.97-7.46z"/><path fill="#34A853" d="M10 20c2.7 0 4.96-.9 6.62-2.43l-3.24-2.52a5.98 5.98 0 0 1-8.91-3.13H1.14v2.6A9.97 9.97 0 0 0 10 20z"/><path fill="#FBBC04" d="M4.47 11.92a5.97 5.97 0 0 1 0-3.83V5.48H1.14a9.99 9.99 0 0 0 0 9.04l3.33-2.6z"/><path fill="#EA4335" d="M10 4a5.43 5.43 0 0 1 3.83 1.48l2.87-2.87A9.6 9.6 0 0 0 10 0a9.97 9.97 0 0 0-8.86 5.48l3.33 2.6A5.97 5.97 0 0 1 10 4z"/></svg>
        Sign up with Google
      </button>
    </form>

    <p style="font-size:var(--text-sm);color:var(--color-text-tertiary);text-align:center;margin-top:32px;">Already have an account? <a href="sign-in.html" style="color:var(--color-text-brand-secondary);font-weight:600;">Log in</a></p>
  </div>
</main>
</body>
</html>

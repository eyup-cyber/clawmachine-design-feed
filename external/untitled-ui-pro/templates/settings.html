<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Settings — Untitled UI Pro</title>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css"><link rel="stylesheet" href="../design.css">
</head>
<body style="background:var(--color-bg-secondary);">
<main class="uui-container" style="padding-top:48px;padding-bottom:96px;">
  <div class="uui-row justify-between items-end" style="margin-bottom:32px;">
    <div>
      <h1 style="font-size:var(--text-display-sm);font-weight:600;color:var(--color-text-primary);">Settings</h1>
      <p style="font-size:var(--text-md);color:var(--color-text-tertiary);margin-top:4px;">Manage your team and preferences here.</p>
    </div>
  </div>

  <nav class="uui-tabs" style="margin-bottom:24px;">
    <button class="uui-tab is-active">My details</button>
    <button class="uui-tab">Profile</button>
    <button class="uui-tab">Password</button>
    <button class="uui-tab">Team</button>
    <button class="uui-tab">Plan</button>
    <button class="uui-tab">Billing</button>
    <button class="uui-tab">Notifications</button>
    <button class="uui-tab">Integrations</button>
    <button class="uui-tab">API</button>
  </nav>

  <section style="background:var(--color-bg-primary);border-radius:var(--radius-xl);box-shadow:inset 0 0 0 1px var(--color-border-secondary);padding:24px 32px;">
    <div class="uui-row justify-between items-start" style="padding-bottom:20px;border-bottom:1px solid var(--color-border-secondary);">
      <div>
        <h2 style="font-size:var(--text-lg);font-weight:600;color:var(--color-text-primary);">Personal info</h2>
        <p style="font-size:var(--text-sm);color:var(--color-text-tertiary);margin-top:4px;">Update your photo and personal details here.</p>
      </div>
      <div class="uui-row gap-3">
        <button class="uui-btn uui-btn--secondary uui-btn--md">Cancel</button>
        <button class="uui-btn uui-btn--primary uui-btn--md">Save</button>
      </div>
    </div>

    <div class="uui-stack" style="padding-top:24px;gap:24px;">
      <!-- name row -->
      <div class="uui-row gap-8" style="padding-bottom:20px;border-bottom:1px solid var(--color-border-secondary);">
        <div style="width:280px;">
          <div style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">Name</div>
        </div>
        <div class="uui-row gap-6" style="flex:1;">
          <div class="uui-input" style="flex:1;"><input value="Olivia"></div>
          <div class="uui-input" style="flex:1;"><input value="Rhye"></div>
        </div>
      </div>

      <!-- email row -->
      <div class="uui-row gap-8" style="padding-bottom:20px;border-bottom:1px solid var(--color-border-secondary);">
        <div style="width:280px;">
          <div style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">Email address</div>
        </div>
        <div class="uui-input" style="flex:1;max-width:512px;">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><rect x="1.67" y="4.17" width="16.67" height="11.67" rx="1.67"/><path d="m1.67 5.83 7.37 5.16a1.67 1.67 0 0 0 1.91 0l7.38-5.16"/></svg>
          <input type="email" value="olivia@untitledui.com">
        </div>
      </div>

      <!-- photo row -->
      <div class="uui-row gap-8" style="padding-bottom:20px;border-bottom:1px solid var(--color-border-secondary);">
        <div style="width:280px;">
          <div style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">Your photo</div>
          <p style="font-size:var(--text-sm);color:var(--color-text-tertiary);margin-top:4px;">This will be displayed on your profile.</p>
        </div>
        <div class="uui-row gap-5" style="flex:1;max-width:512px;">
          <div class="uui-avatar uui-avatar--2xl">OR</div>
          <label style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;text-align:center;border-radius:var(--radius-xl);background:var(--color-bg-primary);box-shadow:inset 0 0 0 1px var(--color-border-secondary);cursor:pointer;">
            <span class="uui-ficon uui-ficon--sm uui-ficon--gray-light" style="box-shadow:0 0 0 1px var(--color-border-secondary),0 0 0 6px var(--color-bg-secondary);">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><path d="M14.17 14.17 10 10 5.83 14.17M10 10v9.17M17.15 15.48a4.58 4.58 0 0 0-2.19-8.6l-1.05-.01a7.08 7.08 0 1 0-12.15 6.45"/></svg>
            </span>
            <div>
              <span style="font-size:var(--text-sm);color:var(--color-text-brand-secondary);font-weight:600;">Click to upload</span>
              <span style="font-size:var(--text-sm);color:var(--color-text-tertiary);"> or drag and drop</span>
            </div>
            <div style="font-size:var(--text-xs);color:var(--color-text-tertiary);">SVG, PNG, JPG or GIF (max. 800x400px)</div>
          </label>
        </div>
      </div>

      <!-- role row -->
      <div class="uui-row gap-8" style="padding-bottom:20px;border-bottom:1px solid var(--color-border-secondary);">
        <div style="width:280px;">
          <div style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">Role</div>
        </div>
        <div class="uui-input" style="flex:1;max-width:512px;"><input value="Product Designer"></div>
      </div>

      <!-- country row -->
      <div class="uui-row gap-8" style="padding-bottom:20px;border-bottom:1px solid var(--color-border-secondary);">
        <div style="width:280px;">
          <div style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">Country</div>
        </div>
        <div class="uui-select" style="flex:1;max-width:512px;">
          <span style="font-size:20px;">UK</span>
          <span class="value">United Kingdom</span>
          <svg class="caret" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"><path d="m5 7.5 5 5 5-5"/></svg>
        </div>
      </div>

      <!-- bio row -->
      <div class="uui-row gap-8">
        <div style="width:280px;">
          <div style="font-size:var(--text-sm);font-weight:500;color:var(--color-text-secondary);">Bio</div>
          <p style="font-size:var(--text-sm);color:var(--color-text-tertiary);margin-top:4px;">Write a short introduction.</p>
        </div>
        <div class="uui-input" style="flex:1;max-width:512px;align-items:flex-start;min-height:128px;">
          <textarea rows="4">I'm a product designer based in the UK with a focus on complex systems, typography, and illustration.</textarea>
        </div>
      </div>
    </div>
  </section>
</main>
</body>
</html>

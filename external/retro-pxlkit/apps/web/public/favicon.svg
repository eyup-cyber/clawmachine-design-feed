<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" fill="#0A0A0F" rx="4"/>
  <!-- Outer frame - green/cyan gradient feel -->
  <rect x="4" y="2" width="24" height="2" fill="#00FF88"/>
  <rect x="2" y="4" width="2" height="24" fill="#00FF88"/>
  <rect x="28" y="4" width="2" height="24" fill="#4ECDC4"/>
  <rect x="4" y="28" width="24" height="2" fill="#4ECDC4"/>
  <!-- Corner pixels -->
  <rect x="4" y="4" width="2" height="2" fill="#00FF88"/>
  <rect x="26" y="4" width="2" height="2" fill="#4ECDC4"/>
  <rect x="4" y="26" width="2" height="2" fill="#4ECDC4"/>
  <rect x="26" y="26" width="2" height="2" fill="#4ECDC4"/>
  <!-- Inner pixel art: stylized "P" -->
  <rect x="8" y="8" width="2" height="14" fill="#FFD700"/>
  <rect x="10" y="8" width="8" height="2" fill="#FFD700"/>
  <rect x="18" y="10" width="2" height="6" fill="#FFD700"/>
  <rect x="10" y="14" width="8" height="2" fill="#FFD700"/>
  <!-- Sparkle/dot accent -->
  <rect x="22" y="20" width="2" height="2" fill="#FF6B6B"/>
  <rect x="24" y="18" width="2" height="2" fill="#FF6B6B"/>
  <rect x="22" y="22" width="4" height="2" fill="#FF6B6B"/>
</svg>

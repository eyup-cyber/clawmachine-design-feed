<!-- Tailwind UI-style — Promo strip / floating banner with dismiss -->
<div class="pointer-events-none fixed inset-x-0 bottom-0 px-6 pb-6">
  <div class="pointer-events-auto mx-auto max-w-xl rounded-xl bg-gray-900 p-6 shadow-lg ring-1 ring-gray-900/10">
    <p class="text-sm/6 text-white">This site uses tracking technologies. You may opt in or opt out of the use of these technologies.</p>
    <div class="mt-4 flex items-center gap-x-5">
      <button type="button" class="rounded-md bg-white px-2.5 py-1.5 text-sm font-semibold text-gray-900 shadow-xs hover:bg-gray-50">Accept all</button>
      <button type="button" class="text-sm/6 font-semibold text-white">Reject all</button>
      <button type="button" class="text-sm/6 font-semibold text-white">Manage cookies</button>
    </div>
  </div>
</div>

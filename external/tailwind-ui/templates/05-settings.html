<!doctype html>
<html lang="en" class="h-full bg-gray-50">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full antialiased text-gray-900">

<div class="flex min-h-full">
  <aside class="hidden w-56 shrink-0 border-r border-gray-200 bg-white p-6 lg:block">
    <h2 class="text-sm font-semibold">Settings</h2>
    <nav class="mt-4 space-y-1 text-sm">
      <a class="block rounded-md bg-gray-100 px-3 py-2 font-medium">Account</a>
      <a class="block rounded-md px-3 py-2 text-gray-600 hover:bg-gray-50">Notifications</a>
      <a class="block rounded-md px-3 py-2 text-gray-600 hover:bg-gray-50">Security</a>
      <a class="block rounded-md px-3 py-2 text-gray-600 hover:bg-gray-50">Billing</a>
      <a class="block rounded-md px-3 py-2 text-gray-600 hover:bg-gray-50">Team</a>
    </nav>
  </aside>
  <main class="flex-1 p-6">
    <h1 class="text-xl font-semibold">Account</h1>
    <form class="mt-6 divide-y divide-gray-200 bg-white rounded-lg ring-1 ring-gray-200">
      <div class="grid grid-cols-3 gap-6 p-6">
        <div class="col-span-1"><h3 class="text-sm font-semibold text-gray-900">Profile</h3><p class="mt-1 text-xs text-gray-500">Your public details.</p></div>
        <div class="col-span-2 space-y-4">
          <div><label class="block text-sm font-medium">Name</label><input class="mt-2 block w-full rounded-md bg-white px-3 py-1.5 outline-1 -outline-offset-1 outline-gray-300 text-sm" value="Regan Cooney" /></div>
          <div><label class="block text-sm font-medium">Email</label><input class="mt-2 block w-full rounded-md bg-white px-3 py-1.5 outline-1 -outline-offset-1 outline-gray-300 text-sm" value="regacooney@gmail.com" /></div>
        </div>
      </div>
      <div class="flex justify-end gap-3 p-6 bg-gray-50 rounded-b-lg"><button class="rounded-md bg-white px-3 py-2 text-sm font-semibold ring-1 ring-gray-300 ring-inset hover:bg-gray-50">Cancel</button><button class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500">Save</button></div>
    </form>
  </main>
</div>
</body>
</html>

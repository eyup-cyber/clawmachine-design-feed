<!doctype html>
<html lang="en" class="h-full bg-gray-50">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full antialiased text-gray-900">

<main class="relative bg-white">
  <div class="grid grid-cols-1 lg:grid-cols-2">
    <div class="px-6 py-24 sm:py-32 lg:px-8 lg:py-48">
      <h2 class="text-3xl font-semibold tracking-tight text-gray-900">Get in touch</h2>
      <p class="mt-4 text-gray-600">We'll respond within 24 hours.</p>
      <form class="mt-10 space-y-6 max-w-lg">
        <div class="grid grid-cols-2 gap-4"><input placeholder="First name" class="block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 text-sm" /><input placeholder="Last name" class="block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 text-sm" /></div>
        <input placeholder="Email" class="block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 text-sm" />
        <textarea rows="4" placeholder="Message" class="block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 text-sm"></textarea>
        <button class="rounded-md bg-indigo-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500">Send</button>
      </form>
    </div>
    <div class="bg-gray-50 p-10"><div class="text-sm/6 text-gray-600"><div class="font-semibold text-gray-900">Clawmachine</div><address class="not-italic mt-2">UK — remote-first</address><p class="mt-6">support@example.com</p></div></div>
  </div>
</main>
</body>
</html>

<!doctype html>
<html lang="en" class="h-full bg-gray-50">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reports</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full antialiased text-gray-900">

<main class="bg-gray-50 p-6">
  <div class="mx-auto max-w-7xl">
    <h1 class="text-2xl font-semibold text-gray-900">Reports</h1>
    <div class="mt-6 grid grid-cols-1 gap-6 lg:grid-cols-2">
      <section class="rounded-lg bg-white p-6 shadow-xs ring-1 ring-gray-200">
        <h2 class="text-base font-semibold">Revenue over time</h2>
        <svg class="mt-6 w-full h-40" viewBox="0 0 400 120"><polyline points="0,100 50,80 100,90 150,60 200,70 250,40 300,50 350,30 400,20" fill="none" stroke="#4f46e5" stroke-width="2"/></svg>
      </section>
      <section class="rounded-lg bg-white p-6 shadow-xs ring-1 ring-gray-200">
        <h2 class="text-base font-semibold">Top categories</h2>
        <ul class="mt-4 divide-y divide-gray-200 text-sm">
          <li class="flex justify-between py-3"><span>MacBooks</span><span>£18,412</span></li>
          <li class="flex justify-between py-3"><span>iPhones</span><span>£12,102</span></li>
          <li class="flex justify-between py-3"><span>Dyson</span><span>£4,210</span></li>
        </ul>
      </section>
    </div>
  </div>
</main>
</body>
</html>

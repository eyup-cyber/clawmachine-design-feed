<!doctype html>
<html lang="en" class="h-full bg-gray-50">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full antialiased text-gray-900">

<main class="bg-white p-6">
  <div class="mx-auto max-w-3xl grid grid-cols-1 gap-8 lg:grid-cols-2 lg:max-w-5xl">
    <section>
      <h2 class="text-lg font-semibold">Contact information</h2>
      <div class="mt-4 space-y-4">
        <input type="email" placeholder="Email" class="block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 text-sm" />
      </div>
      <h2 class="mt-10 text-lg font-semibold">Shipping</h2>
      <div class="mt-4 grid grid-cols-2 gap-4">
        <input placeholder="First name" class="block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 text-sm" />
        <input placeholder="Last name" class="block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 text-sm" />
        <input placeholder="Address" class="col-span-2 block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 text-sm" />
        <input placeholder="Postcode" class="block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 text-sm" />
        <input placeholder="City" class="block w-full rounded-md bg-white px-3 py-2 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 text-sm" />
      </div>
    </section>
    <aside class="lg:sticky lg:top-4 rounded-lg bg-gray-50 p-6 ring-1 ring-gray-200">
      <h2 class="text-lg font-semibold">Order summary</h2>
      <ul class="mt-4 divide-y divide-gray-200 text-sm">
        <li class="flex justify-between py-3"><span>MacBook Pro 14"</span><span>£899</span></li>
        <li class="flex justify-between py-3"><span>AppleCare</span><span>£129</span></li>
      </ul>
      <dl class="mt-6 space-y-2 border-t border-gray-200 pt-4 text-sm">
        <div class="flex justify-between"><dt>Subtotal</dt><dd>£1,028</dd></div>
        <div class="flex justify-between"><dt>Shipping</dt><dd>£0</dd></div>
        <div class="flex justify-between text-base font-semibold"><dt>Total</dt><dd>£1,028</dd></div>
      </dl>
      <button class="mt-6 w-full rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500">Place order</button>
    </aside>
  </div>
</main>
</body>
</html>

<!doctype html>
<html lang="en" class="h-full bg-gray-50">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analytics</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full antialiased text-gray-900">

<main class="bg-gray-50 p-6">
  <div class="mx-auto max-w-7xl">
    <h1 class="text-2xl font-semibold text-gray-900">Analytics</h1>
    <dl class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-4"><div class="rounded-lg bg-white p-5 shadow-xs ring-1 ring-gray-200"><dt class="text-sm text-gray-500">Visitors</dt><dd class="mt-1 text-2xl font-semibold">18,214</dd></div><div class="rounded-lg bg-white p-5 shadow-xs ring-1 ring-gray-200"><dt class="text-sm text-gray-500">Pageviews</dt><dd class="mt-1 text-2xl font-semibold">42,007</dd></div><div class="rounded-lg bg-white p-5 shadow-xs ring-1 ring-gray-200"><dt class="text-sm text-gray-500">Bounce</dt><dd class="mt-1 text-2xl font-semibold">32.4%</dd></div><div class="rounded-lg bg-white p-5 shadow-xs ring-1 ring-gray-200"><dt class="text-sm text-gray-500">Avg session</dt><dd class="mt-1 text-2xl font-semibold">4:21</dd></div></dl>
    <section class="mt-6 rounded-lg bg-white p-6 shadow-xs ring-1 ring-gray-200"><h2 class="text-base font-semibold">Traffic</h2><svg class="mt-6 w-full h-48" viewBox="0 0 500 150"><polyline points="0,120 50,100 100,110 150,80 200,90 250,60 300,70 350,40 400,50 450,30 500,20" fill="none" stroke="#4f46e5" stroke-width="2"/></svg></section>
  </div>
</main>
</body>
</html>

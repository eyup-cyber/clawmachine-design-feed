<!-- Tailwind UI-style — Simple toggle -->
<div class="flex items-center">
  <button type="button" class="group relative inline-flex h-5 w-10 shrink-0 cursor-pointer items-center justify-center rounded-full focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600" role="switch" aria-checked="false">
    <span aria-hidden="true" class="pointer-events-none absolute size-full rounded-md bg-white"></span>

    <span aria-hidden="true" class="pointer-events-none absolute left-0 inline-block size-5 transform rounded-full border border-gray-200 bg-white shadow-sm ring-0 transition-transform duration-200 ease-in-out group-aria-checked:translate-x-5"></span>
  </button>
  <span class="ml-3 text-sm"><span class="font-medium text-gray-900">Annual billing</span> <span class="text-gray-500">(Save 10%)</span></span>
</div>

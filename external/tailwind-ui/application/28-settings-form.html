<!-- Tailwind UI-style — Two-column settings form -->
<form>
  <div class="space-y-12">
    <div class="grid grid-cols-1 gap-x-8 gap-y-10 border-b border-gray-900/10 pb-12 md:grid-cols-3">
      <div><h2 class="text-base/7 font-semibold text-gray-900">Profile</h2><p class="mt-1 text-sm/6 text-gray-600">This information will be displayed publicly.</p></div>
      <div class="grid max-w-2xl grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6 md:col-span-2">
        <div class="sm:col-span-4"><label for="username" class="block text-sm/6 font-medium text-gray-900">Username</label>
          <div class="mt-2"><div class="flex items-center rounded-md bg-white pl-3 outline-1 -outline-offset-1 outline-gray-300 has-[input:focus-within]:outline-2 has-[input:focus-within]:-outline-offset-2 has-[input:focus-within]:outline-indigo-600"><div class="shrink-0 text-base text-gray-500 select-none sm:text-sm/6">workcation.com/</div><input type="text" name="username" id="username" autocomplete="username" class="block min-w-0 grow py-1.5 pr-3 pl-1 text-base text-gray-900 placeholder:text-gray-400 focus:outline focus:outline-0 sm:text-sm/6" placeholder="janesmith"></div></div>
        </div>
        <div class="col-span-full"><label for="about" class="block text-sm/6 font-medium text-gray-900">About</label><div class="mt-2"><textarea id="about" name="about" rows="3" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"></textarea></div></div>
      </div>
    </div>
  </div>
  <div class="mt-6 flex items-center justify-end gap-x-6"><button type="button" class="text-sm/6 font-semibold text-gray-900">Cancel</button><button type="submit" class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500">Save</button></div>
</form>

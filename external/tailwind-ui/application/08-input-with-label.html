<!-- Tailwind UI-style — Input with label, description, error -->
<form class="grid max-w-md grid-cols-1 gap-6">
  <div>
    <label for="email" class="block text-sm/6 font-medium text-gray-900">Email address</label>
    <div class="mt-2"><input type="email" name="email" id="email" autocomplete="email" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6" placeholder="you@example.com"></div>
  </div>

  <div>
    <label for="handle" class="block text-sm/6 font-medium text-gray-900">Username</label>
    <div class="mt-2">
      <div class="flex items-center rounded-md bg-white pl-3 outline-1 -outline-offset-1 outline-gray-300 has-[input:focus-within]:outline-2 has-[input:focus-within]:-outline-offset-2 has-[input:focus-within]:outline-indigo-600">
        <div class="shrink-0 text-base text-gray-500 select-none sm:text-sm/6">workcation.com/</div>
        <input type="text" name="handle" id="handle" class="block min-w-0 grow py-1.5 pr-3 pl-1 text-base text-gray-900 placeholder:text-gray-400 focus:outline focus:outline-0 sm:text-sm/6" placeholder="janesmith">
      </div>
    </div>
    <p class="mt-2 text-sm text-gray-500">This is how others will see you on the site.</p>
  </div>

  <div>
    <label for="email-error" class="block text-sm/6 font-medium text-gray-900">Email</label>
    <div class="mt-2 grid grid-cols-1">
      <input type="email" id="email-error" class="col-start-1 row-start-1 block w-full rounded-md bg-white py-1.5 pr-10 pl-3 text-base text-red-900 outline-1 -outline-offset-1 outline-red-300 placeholder:text-red-300 focus:outline-2 focus:-outline-offset-2 focus:outline-red-600 sm:pr-9 sm:text-sm/6" placeholder="you@example.com" value="adam@tailwindcss" aria-invalid="true" aria-describedby="email-error-desc">
      <svg class="pointer-events-none col-start-1 row-start-1 mr-3 size-5 self-center justify-self-end text-red-500 sm:size-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-8-5a.75.75 0 0 1 .75.75v4.5a.75.75 0 0 1-1.5 0v-4.5A.75.75 0 0 1 10 5Zm0 11a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/></svg>
    </div>
    <p class="mt-2 text-sm text-red-600" id="email-error-desc">Not a valid email address.</p>
  </div>
</form>

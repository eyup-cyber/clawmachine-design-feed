<!-- Tailwind UI-style — Checkbox list with description -->
<fieldset>
  <legend class="text-sm font-semibold text-gray-900">Notifications</legend>
  <p class="text-sm text-gray-500">Choose how you want to be notified.</p>
  <div class="mt-6 space-y-6">
    <div class="relative flex items-start">
      <div class="flex h-6 items-center"><input id="comments" type="checkbox" checked class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600"></div>
      <div class="ml-3 text-sm leading-6"><label for="comments" class="font-medium text-gray-900">Comments</label><p class="text-gray-500">Get notified when someone posts a comment on a posting.</p></div>
    </div>
    <div class="relative flex items-start">
      <div class="flex h-6 items-center"><input id="candidates" type="checkbox" class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600"></div>
      <div class="ml-3 text-sm leading-6"><label for="candidates" class="font-medium text-gray-900">Candidates</label><p class="text-gray-500">Get notified when a candidate applies for a job.</p></div>
    </div>
    <div class="relative flex items-start">
      <div class="flex h-6 items-center"><input id="offers" type="checkbox" class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600"></div>
      <div class="ml-3 text-sm leading-6"><label for="offers" class="font-medium text-gray-900">Offers</label><p class="text-gray-500">Get notified when a candidate accepts or rejects an offer.</p></div>
    </div>
  </div>
</fieldset>

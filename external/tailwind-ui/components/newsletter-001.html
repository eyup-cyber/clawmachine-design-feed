<!-- Newsletter signup 1 — clean-room Tailwind UI recreation -->
<section class="bg-white py-16 sm:py-24"><div class="mx-auto max-w-7xl sm:px-6 lg:px-8"><div class="relative isolate overflow-hidden bg-gray-900 px-6 py-24 shadow-2xl sm:rounded-3xl sm:px-24 xl:py-32"><h2 class="mx-auto max-w-2xl text-center text-3xl font-semibold tracking-tight text-white sm:text-4xl">Get notified when we launch</h2><form class="mx-auto mt-10 flex max-w-md gap-x-4"><input type="email" class="min-w-0 flex-auto rounded-md bg-white/5 px-3.5 py-2 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" placeholder="Enter your email" /><button type="submit" class="flex-none rounded-md bg-indigo-500 px-3.5 py-2.5 text-sm font-semibold text-white shadow-xs hover:bg-indigo-400">Notify me</button></form></div></div></section>

<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Color picker</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Color picker — clean-room Tailwind UI recreation -->
<div>
  <label class="block text-sm font-medium text-gray-900">Color</label>
  <div class="mt-2 flex items-center gap-x-3">
    <input type="color" value="#4f46e5" class="size-10 rounded-md border border-gray-200" />
    <code class="text-sm text-gray-700">#4f46e5</code>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Input error state</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Input error state — clean-room Tailwind UI recreation -->
<div>
  <label class="block text-sm font-medium text-red-700">Email</label>
  <div class="mt-2">
    <input type="email" value="adam" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-red-900 outline-1 -outline-offset-1 outline-red-500 placeholder:text-red-300 focus:outline-2 focus:-outline-offset-2 focus:outline-red-600 sm:text-sm" />
  </div>
  <p class="mt-2 text-sm text-red-600">Not a valid email address.</p>
</div>
</body>
</html>

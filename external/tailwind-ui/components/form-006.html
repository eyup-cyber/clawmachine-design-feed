<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Form 6</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Form 6 — clean-room Tailwind UI recreation -->
<form class="space-y-6 bg-white p-8 rounded-lg shadow-xs ring-1 ring-gray-200">
  <h2 class="text-lg font-semibold text-gray-900">Form 6</h2>
  <div><label class="block text-sm font-medium text-gray-900">Label</label><input type="text" class="mt-2 block w-full rounded-md bg-white px-3 py-1.5 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 text-sm" /></div>
  <div><label class="block text-sm font-medium text-gray-900">Email</label><input type="email" class="mt-2 block w-full rounded-md bg-white px-3 py-1.5 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 text-sm" /></div>
  <div><label class="block text-sm font-medium text-gray-900">Bio</label><textarea rows="3" class="mt-2 block w-full rounded-md bg-white px-3 py-1.5 outline-1 -outline-offset-1 outline-gray-300 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 text-sm"></textarea></div>
  <div class="flex justify-end gap-3"><button type="button" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 ring-1 ring-gray-300 ring-inset hover:bg-gray-50">Cancel</button><button type="submit" class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500">Save</button></div>
</form>
</body>
</html>

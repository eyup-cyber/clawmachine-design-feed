<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Input with country select</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Input with country select — clean-room Tailwind UI recreation -->
<div>
  <label class="block text-sm font-medium text-gray-900">Phone</label>
  <div class="mt-2 flex rounded-md bg-white outline-1 -outline-offset-1 outline-gray-300 focus-within:outline-2 focus-within:-outline-offset-2 focus-within:outline-indigo-600">
    <select class="rounded-l-md bg-transparent py-1.5 pl-3 pr-7 text-sm text-gray-700 focus:outline-none">
      <option>US</option><option>CA</option><option>EU</option>
    </select>
    <input type="tel" class="block min-w-0 grow bg-transparent px-3 py-1.5 text-base text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm" placeholder="+1 (555) 000-0000" />
  </div>
</div>
</body>
</html>

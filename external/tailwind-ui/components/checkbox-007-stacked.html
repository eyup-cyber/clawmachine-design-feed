<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkbox stacked</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Checkbox stacked — clean-room Tailwind UI recreation -->
<div class="space-y-4"><div class="flex gap-3"><input id="s1" type="checkbox" class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600" /><label for="s1" class="text-sm font-medium text-gray-900">Option 1</label></div><div class="flex gap-3"><input id="s2" type="checkbox" class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600" /><label for="s2" class="text-sm font-medium text-gray-900">Option 2</label></div><div class="flex gap-3"><input id="s3" type="checkbox" class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600" /><label for="s3" class="text-sm font-medium text-gray-900">Option 3</label></div><div class="flex gap-3"><input id="s4" type="checkbox" class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600" /><label for="s4" class="text-sm font-medium text-gray-900">Option 4</label></div></div>
</body>
</html>

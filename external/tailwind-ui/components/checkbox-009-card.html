<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkbox card</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Checkbox card — clean-room Tailwind UI recreation -->
<label class="flex cursor-pointer rounded-lg border border-gray-200 bg-white p-4 shadow-xs ring-1 ring-transparent focus-within:ring-indigo-600 has-[:checked]:border-indigo-600 has-[:checked]:ring-2">
  <input type="checkbox" class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600" />
  <span class="ml-3 text-sm font-medium text-gray-900">Newsletter opt-in</span>
</label>
</body>
</html>

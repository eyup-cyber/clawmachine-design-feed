<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radio vertical</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Radio vertical — clean-room Tailwind UI recreation -->
<fieldset>
  <legend class="text-sm font-semibold text-gray-900">Notifications</legend>
  <p class="mt-1 text-sm text-gray-500">How do you prefer to receive alerts?</p>
  <div class="mt-4 space-y-4">
    <label class="flex items-center gap-3">
      <input type="radio" name="n" class="size-4 border-gray-300 text-indigo-600 focus:ring-indigo-600" />
      <span class="text-sm font-medium text-gray-900">Email</span>
    </label>
    <label class="flex items-center gap-3">
      <input type="radio" name="n" class="size-4 border-gray-300 text-indigo-600 focus:ring-indigo-600" />
      <span class="text-sm font-medium text-gray-900">SMS</span>
    </label>
    <label class="flex items-center gap-3">
      <input type="radio" name="n" class="size-4 border-gray-300 text-indigo-600 focus:ring-indigo-600" />
      <span class="text-sm font-medium text-gray-900">Push notifications</span>
    </label></div></fieldset>
</body>
</html>

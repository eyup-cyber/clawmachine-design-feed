<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Textarea</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Textarea — clean-room Tailwind UI recreation -->
<fieldset>
  <legend class="block text-sm font-medium text-gray-900">Message</legend>
  <div class="mt-2">
    <textarea rows="4" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm" placeholder="Add your message..."></textarea>
  </div>
  <p class="mt-2 text-sm text-gray-500">Write a few sentences.</p>
</fieldset>
</body>
</html>

<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avatar group</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Avatar group — clean-room Tailwind UI recreation -->
<div class="flex -space-x-2 overflow-hidden">
  <img class="inline-block size-8 rounded-full ring-2 ring-white" src="https://i.pravatar.cc/40?u=1" />
  <img class="inline-block size-8 rounded-full ring-2 ring-white" src="https://i.pravatar.cc/40?u=2" />
  <img class="inline-block size-8 rounded-full ring-2 ring-white" src="https://i.pravatar.cc/40?u=3" />
  <span class="inline-flex items-center justify-center size-8 rounded-full bg-gray-200 ring-2 ring-white"><span class="text-xs font-medium text-gray-800">+3</span></span>
</div>
</body>
</html>

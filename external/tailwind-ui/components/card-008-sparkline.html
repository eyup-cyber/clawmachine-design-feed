<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Card with sparkline</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Card with sparkline — clean-room Tailwind UI recreation -->
<div class="rounded-lg bg-white p-6 shadow-xs ring-1 ring-gray-200">
  <div class="flex items-baseline justify-between">
    <dt class="text-sm font-medium text-gray-500">Active users</dt>
    <span class="rounded-md bg-green-50 px-1.5 py-0.5 text-xs font-medium text-green-700">+5.4%</span>
  </div>
  <dd class="mt-2 text-3xl font-semibold text-gray-900">12,431</dd>
  <svg class="mt-4 w-full h-10" viewBox="0 0 100 30" preserveAspectRatio="none"><polyline points="0,20 10,18 20,22 30,15 40,10 50,14 60,8 70,12 80,6 90,9 100,4" fill="none" stroke="#4f46e5" stroke-width="2"/></svg>
</div>
</body>
</html>

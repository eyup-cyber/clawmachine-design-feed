<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkbox indeterminate</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Checkbox indeterminate — clean-room Tailwind UI recreation -->
<label class="flex items-center gap-2"><input type="checkbox" checked class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600" /><span class="text-sm font-medium text-gray-900">Indeterminate checkbox</span></label>
</body>
</html>

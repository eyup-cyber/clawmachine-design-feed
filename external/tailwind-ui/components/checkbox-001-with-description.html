<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkbox with description</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Checkbox with description — clean-room Tailwind UI recreation -->
<div class="flex gap-3">
  <div class="flex h-6 shrink-0 items-center">
    <input id="c" type="checkbox" class="size-4 rounded-sm border-gray-300 text-indigo-600 focus:ring-indigo-600" />
  </div>
  <div class="text-sm/6">
    <label for="c" class="font-medium text-gray-900">Comments</label>
    <p class="text-gray-500">Get notified when someone replies.</p>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile card</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Profile card — clean-room Tailwind UI recreation -->
<div class="overflow-hidden rounded-lg bg-white shadow-xs ring-1 ring-gray-200">
  <div class="h-24 bg-gradient-to-r from-indigo-500 to-purple-600"></div>
  <div class="relative px-6 pb-6 -mt-10">
    <img class="size-20 rounded-full ring-4 ring-white" src="https://i.pravatar.cc/160?u=x" />
    <h3 class="mt-3 text-lg font-semibold text-gray-900">Casey Blake</h3>
    <p class="text-sm text-gray-500">Product Designer</p>
  </div>
</div>
</body>
</html>

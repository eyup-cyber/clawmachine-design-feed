<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Range slider</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Range slider — clean-room Tailwind UI recreation -->
<div>
  <label for="r" class="block text-sm font-medium text-gray-900">Range</label>
  <div class="mt-2">
    <input id="r" type="range" min="0" max="100" value="40" class="w-full accent-indigo-600" />
  </div>
  <p class="mt-2 text-sm text-gray-500">Value: 40</p>
</div>
</body>
</html>

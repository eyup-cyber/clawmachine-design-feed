<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Input leading URL</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Input leading URL — clean-room Tailwind UI recreation -->
<div>
  <label class="block text-sm font-medium text-gray-900">Website</label>
  <div class="mt-2 flex rounded-md bg-white outline-1 -outline-offset-1 outline-gray-300 focus-within:outline-2 focus-within:-outline-offset-2 focus-within:outline-indigo-600">
    <span class="pl-3 text-gray-500 self-center text-sm">https://</span>
    <input type="text" class="block min-w-0 grow bg-transparent px-2.5 py-1.5 text-base text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm" placeholder="example.com" />
  </div>
</div>
</body>
</html>

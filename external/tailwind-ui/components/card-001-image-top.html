<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />

<title>Card image top</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Card image top — clean-room Tailwind UI recreation -->
<div class="max-w-sm overflow-hidden rounded-lg bg-white shadow-xs ring-1 ring-gray-200">
  <img class="h-48 w-full object-cover" src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=600" />
  <div class="p-5">
    <h3 class="text-lg font-semibold text-gray-900">Mountain ridge</h3>

    <a href="#" class="mt-4 inline-block text-sm font-semibold text-indigo-600 hover:text-indigo-500">Read more →</a>
  </div>
</div>

</html>

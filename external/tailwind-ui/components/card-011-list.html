  <ul class="divide-y divide-gray-200"><li class="px-6 py-4 flex items-center gap-3"><span class="size-2 rounded-full bg-indigo-600"></span><span class="text-sm text-gray-700 flex-1">Event 1</span><time class="text-xs text-gray-500">2h ago</time></li><li class="px-6 py-4 flex items-center gap-3"><span class="size-2 rounded-full bg-indigo-600"></span><span class="text-sm text-gray-700 flex-1">Event 2</span><time class="text-xs text-gray-500">2h ago</time></li><li class="px-6 py-4 flex items-center gap-3"><span class="size-2 rounded-full bg-indigo-600"></span><span class="text-sm text-gray-700 flex-1">Event 3</span><time class="text-xs text-gray-500">2h ago</time></li><li class="px-6 py-4 flex items-center gap-3"><span class="size-2 rounded-full bg-indigo-600"></span><span class="text-sm text-gray-700 flex-1">Event 4</span><time class="text-xs text-gray-500">2h ago</time></li></ul></div>
</body>
</html>

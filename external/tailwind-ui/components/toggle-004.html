<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Toggle 4</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Toggle 4 — clean-room Tailwind UI recreation -->
<div class="flex items-center gap-x-3">
  <button type="button" role="switch" aria-checked="false" class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer rounded-full bg-gray-200 transition-colors focus:outline-2 focus:outline-offset-2 focus:outline-indigo-600">
    <span class="pointer-events-none inline-block size-5 transform rounded-full bg-white shadow-sm ring-0 transition translate-x-0 translate-y-0.5 translate-x-0.5"></span>
  </button>
  <span class="text-sm font-medium text-gray-900">Toggle 4</span>
</div>
</body>
</html>

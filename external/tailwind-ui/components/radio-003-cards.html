<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radio cards</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Radio cards — clean-room Tailwind UI recreation -->
<fieldset>
  <legend class="text-sm font-semibold text-gray-900">Server size</legend>
  <div class="mt-4 grid grid-cols-3 gap-4">
    <label class="relative flex cursor-pointer rounded-lg border border-gray-200 bg-white p-4 shadow-xs focus:outline-none has-[:checked]:border-indigo-600 has-[:checked]:ring-2 has-[:checked]:ring-indigo-600">
      <input type="radio" name="rc" class="sr-only" />
      <span class="flex flex-1 flex-col">
        <span class="block text-sm font-medium text-gray-900">Size S</span>
        <span class="mt-1 text-sm text-gray-500">2 CPU / 4GB RAM</span>
      </span>
    </label>
    <label class="relative flex cursor-pointer rounded-lg border border-gray-200 bg-white p-4 shadow-xs focus:outline-none has-[:checked]:border-indigo-600 has-[:checked]:ring-2 has-[:checked]:ring-indigo-600">
      <input type="radio" name="rc" class="sr-only" />
      <span class="flex flex-1 flex-col">
        <span class="block text-sm font-medium text-gray-900">Size M</span>
        <span class="mt-1 text-sm text-gray-500">4 CPU / 8GB RAM</span>
      </span>
    </label>
    <label class="relative flex cursor-pointer rounded-lg border border-gray-200 bg-white p-4 shadow-xs focus:outline-none has-[:checked]:border-indigo-600 has-[:checked]:ring-2 has-[:checked]:ring-indigo-600">
      <input type="radio" name="rc" class="sr-only" />
      <span class="flex flex-1 flex-col">
        <span class="block text-sm font-medium text-gray-900">Size L</span>
        <span class="mt-1 text-sm text-gray-500">8 CPU / 16GB RAM</span>
      </span>
    </label></div></fieldset>
</body>
</html>

<!doctype html>
<html lang="en" class="h-full bg-white">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Card CTA</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet" />
<style>html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="h-full bg-gray-50 p-8 antialiased text-gray-900">
<!-- Card CTA — clean-room Tailwind UI recreation -->
<div class="rounded-lg bg-white p-6 shadow-xs ring-1 ring-gray-200">
  <h3 class="text-base font-semibold text-gray-900">Invite teammates</h3>
  <p class="mt-1 text-sm text-gray-500">Add your team to collaborate.</p>
  <div class="mt-4"><button class="inline-flex items-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500">Invite</button></div>
</div>
</body>
</html>

<!-- Tailwind UI-style — Simple shopping cart page (single-column) -->
<div class="bg-white">
  <div class="mx-auto max-w-2xl px-4 pt-16 pb-24 sm:px-6 lg:max-w-7xl lg:px-8">
    <h1 class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">Shopping Cart</h1>
    <form class="mt-12">
      <div>
        <h2 class="sr-only">Items in your shopping cart</h2>
        <ul role="list" class="divide-y divide-gray-200 border-t border-b border-gray-200">
          <li class="flex py-6 sm:py-10"><div class="shrink-0"><img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/shopping-cart-page-01-product-01.jpg" alt="" class="size-24 rounded-md object-cover sm:size-48"></div><div class="ml-4 flex flex-1 flex-col justify-between sm:ml-6"><div class="relative pr-9 sm:grid sm:grid-cols-2 sm:gap-x-6 sm:pr-0"><div><div class="flex justify-between"><h3 class="text-sm"><a href="#" class="font-medium text-gray-700 hover:text-gray-800">Throwback Hip Bag</a></h3></div><div class="mt-1 flex text-sm"><p class="text-gray-500">Salmon</p><p class="ml-4 border-l border-gray-200 pl-4 text-gray-500">Medium</p></div><p class="mt-1 text-sm font-medium text-gray-900">$90.00</p></div><div class="mt-4 sm:mt-0 sm:pr-9"><label for="quantity-0" class="sr-only">Quantity</label><select id="quantity-0" name="quantity-0" class="max-w-full rounded-md border border-gray-300 py-1.5 text-left text-base font-medium text-gray-700 sm:text-sm"><option value="1">1</option><option value="2">2</option></select></div></div></div></li>
          <li class="flex py-6 sm:py-10"><div class="shrink-0"><img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/shopping-cart-page-01-product-02.jpg" alt="" class="size-24 rounded-md object-cover sm:size-48"></div><div class="ml-4 flex flex-1 flex-col justify-between sm:ml-6"><div class="relative pr-9 sm:grid sm:grid-cols-2 sm:gap-x-6 sm:pr-0"><div><div class="flex justify-between"><h3 class="text-sm"><a href="#" class="font-medium text-gray-700 hover:text-gray-800">Medium Stuff Satchel</a></h3></div><div class="mt-1 flex text-sm"><p class="text-gray-500">Blue</p></div><p class="mt-1 text-sm font-medium text-gray-900">$32.00</p></div></div></div></li>
        </ul>
      </div>
      <div class="mt-10 sm:ml-32 sm:pl-6">

          <div class="flow-root"><dl class="-my-4 divide-y divide-gray-200 text-sm"><div class="flex items-center justify-between py-4"><dt class="text-gray-600">Subtotal</dt><dd class="font-medium text-gray-900">$99.00</dd></div><div class="flex items-center justify-between py-4"><dt class="text-gray-600">Shipping</dt><dd class="font-medium text-gray-900">$5.00</dd></div><div class="flex items-center justify-between py-4"><dt class="text-base font-medium text-gray-900">Order total</dt><dd class="text-base font-medium text-gray-900">$112.32</dd></div></dl></div>
        </div>
        <div class="mt-10"><button type="submit" class="w-full rounded-md border border-transparent bg-indigo-600 px-4 py-3 text-base font-medium text-white shadow-xs hover:bg-indigo-700">Checkout</button></div>
      </div>
    </form>
  </div>
</div>

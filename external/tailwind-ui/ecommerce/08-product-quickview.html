<!-- Tailwind UI-style — Product quickview modal -->
<div class="relative z-10" role="dialog" aria-modal="true">
  <div class="fixed inset-0 hidden bg-gray-500/75 transition-opacity md:block"></div>
  <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
    <div class="flex min-h-full items-stretch justify-center text-center md:items-center md:px-2 lg:px-4">
      <div class="flex w-full transform text-left text-base transition md:my-8 md:max-w-2xl md:px-4 lg:max-w-4xl">
        <div class="relative flex w-full items-center overflow-hidden bg-white px-4 pt-14 pb-8 shadow-2xl sm:px-6 sm:pt-8 md:p-6 lg:p-8">
          <button type="button" class="absolute top-4 right-4 text-gray-400 hover:text-gray-500 sm:top-8 sm:right-6 md:top-6 md:right-6 lg:top-8 lg:right-8"><svg class="size-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
          <div class="grid w-full grid-cols-1 items-start gap-x-6 gap-y-8 sm:grid-cols-12 lg:gap-x-8">
            <div class="aspect-2/3 w-full overflow-hidden rounded-lg bg-gray-100 sm:col-span-4 lg:col-span-5"><img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/product-quick-preview-03-featured.jpg" alt="" class="size-full object-cover"></div>
            <div class="sm:col-span-8 lg:col-span-7">
              <h2 class="text-xl font-medium text-gray-900 sm:pr-12">Basic Tee 6-Pack</h2>
              <section aria-labelledby="information-heading" class="mt-1"><p class="font-medium text-gray-900">$192</p></section>
              <section aria-labelledby="options-heading" class="mt-10">
                <form>
                  <button type="submit" class="mt-6 flex w-full items-center justify-center rounded-md border border-transparent bg-indigo-600 px-8 py-3 text-base font-medium text-white hover:bg-indigo-700">Add to bag</button>
                </form>
              </section>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

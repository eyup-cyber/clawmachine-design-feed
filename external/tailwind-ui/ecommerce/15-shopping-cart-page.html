<!-- Tailwind UI-style — Full shopping cart page with item controls -->
<main class="mx-auto max-w-7xl px-4 pt-16 pb-24 sm:px-6 lg:px-8">
  <h1 class="text-3xl font-bold tracking-tight text-gray-900 sm:text-4xl">Shopping Cart</h1>
  <form class="mt-12 lg:grid lg:grid-cols-12 lg:items-start lg:gap-x-12 xl:gap-x-16">
    <section aria-labelledby="cart-heading" class="lg:col-span-7">
      <h2 id="cart-heading" class="sr-only">Items in your shopping cart</h2>
      <ul role="list" class="divide-y divide-gray-200 border-t border-b border-gray-200">
        <li class="flex py-6 sm:py-10"><div class="shrink-0"><img src="https://tailwindcss.com/plus-assets/img/ecommerce-images/shopping-cart-page-04-product-01.jpg" alt="" class="size-24 rounded-md object-cover sm:size-32"></div><div class="ml-4 flex flex-1 flex-col justify-between sm:ml-6"><div class="relative pr-9 sm:grid sm:grid-cols-2 sm:gap-x-6 sm:pr-0"><div><div class="flex justify-between"><h3 class="text-sm"><a href="#" class="font-medium text-gray-700 hover:text-gray-800">Artwork Tee</a></h3></div><div class="mt-1 flex text-sm"><p class="text-gray-500">Iso Dots</p><p class="ml-4 border-l border-gray-200 pl-4 text-gray-500">Large</p></div><p class="mt-1 text-sm font-medium text-gray-900">$32.00</p></div><div class="mt-4 sm:mt-0 sm:pr-9"><div class="absolute top-0 right-0"><button type="button" class="-m-2 inline-flex p-2 text-gray-400 hover:text-gray-500"><span class="sr-only">Remove</span><svg class="size-5" viewBox="0 0 20 20" fill="currentColor"><path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"/></svg></button></div></div></div><p class="mt-4 flex space-x-2 text-sm text-gray-700"><svg class="size-5 shrink-0 text-green-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd"/></svg><span>In stock</span></p></div></li>
      </ul>
    </section>
    <section aria-labelledby="summary-heading" class="mt-16 rounded-lg bg-gray-50 px-4 py-6 sm:p-6 lg:col-span-5 lg:mt-0 lg:p-8">
      <h2 id="summary-heading" class="text-lg font-medium text-gray-900">Order summary</h2>
      <dl class="mt-6 space-y-4"><div class="flex items-center justify-between"><dt class="text-sm text-gray-600">Subtotal</dt><dd class="text-sm font-medium text-gray-900">$99.00</dd></div><div class="flex items-center justify-between border-t border-gray-200 pt-4"><dt class="text-base font-medium text-gray-900">Order total</dt><dd class="text-base font-medium text-gray-900">$112.32</dd></div></dl>
      <div class="mt-6"><button type="submit" class="w-full rounded-md border border-transparent bg-indigo-600 px-4 py-3 text-base font-medium text-white shadow-xs hover:bg-indigo-700">Checkout</button></div>
    </section>
  </form>
</main>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="noise">
      <feTurbulence type="turbulence" baseFrequency="1.2" numOctaves="2" seed="12"/>
      <feColorMatrix values="0 0 0 0 0.90 0 0 0 0 0.82 0 0 0 0 0.68 0 0 0 0.22 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#f7eed7"/>
  <rect width="400" height="400" filter="url(#noise)" opacity="0.8"/>
</svg>

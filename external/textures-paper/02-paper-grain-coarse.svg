<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.35" numOctaves="5" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.55 0 0 0 0 0.48 0 0 0 0 0.40 0 0 0 0.25 0"/>
    </filter>
    <pattern id="tile" x="0" y="0" width="400" height="400" patternUnits="userSpaceOnUse">
      <rect width="400" height="400" fill="#e8dfc8"/>
      <rect width="400" height="400" filter="url(#grain)"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#tile)"/>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="dotgrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="17"/>
      <feColorMatrix values="0 0 0 0 0.85 0 0 0 0 0.82 0 0 0 0 0.75 0 0 0 0.15 0"/>
    </filter>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r="0.8" fill="#a08868" opacity="0.55"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="#f5eedc"/>
  <rect width="400" height="400" fill="url(#dots)"/>
  <rect width="400" height="400" filter="url(#dotgrain)"/>
</svg>

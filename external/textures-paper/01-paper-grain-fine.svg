<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="1"/>
      <feColorMatrix values="0 0 0 0 0.95 0 0 0 0 0.93 0 0 0 0 0.88 0 0 0 0.15 0"/>
    </filter>
    <pattern id="tile" x="0" y="0" width="400" height="400" patternUnits="userSpaceOnUse">
      <rect width="400" height="400" fill="#f4f0e6"/>
      <rect width="400" height="400" filter="url(#grain)"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#tile)"/>
</svg>

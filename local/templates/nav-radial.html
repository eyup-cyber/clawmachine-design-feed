<!-- NAV VARIANT: RADIAL — orbital dial navigation, sci-fi inspired -->
<style>
.nav-radial {
  grid-area: sidebar;
  background: var(--sl-surface);
  border-right: 1px solid var(--sl-border-color);
  width: var(--sl-sidebar-width);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--sl-space-lg) var(--sl-space-md);
  overflow-y: auto;
}

.nav-radial .orbit-ring {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 1px solid var(--sl-border-color);
  position: relative;
  margin: var(--sl-space-md) 0;
  flex-shrink: 0;
}

.nav-radial .orbit-ring::before {
  content: '';
  position: absolute;
  inset: 20px;
  border-radius: 50%;
  border: 1px dashed var(--sl-border-color);
}

.nav-radial .orbit-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--sl-accent);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 0 20px color-mix(in srgb, var(--sl-accent) 30%, transparent);
  transition: box-shadow 0.3s;
}

.nav-radial .orbit-center:hover {
  box-shadow: 0 0 30px color-mix(in srgb, var(--sl-accent) 50%, transparent);
}

.nav-radial .orbit-center svg {
  width: 18px;
  height: 18px;
  stroke: var(--sl-bg);
  fill: none;
  stroke-width: 2;
}

.nav-radial .orbit-node {
  position: absolute;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--sl-card);
  border: 1px solid var(--sl-border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  transform: translate(-50%, -50%);
}

.nav-radial .orbit-node:hover {
  border-color: var(--sl-accent);
  box-shadow: 0 0 8px color-mix(in srgb, var(--sl-accent) 25%, transparent);
}

.nav-radial .orbit-node.active {
  border-color: var(--sl-accent);
  background: color-mix(in srgb, var(--sl-accent) 15%, var(--sl-card));
  box-shadow: 0 0 12px color-mix(in srgb, var(--sl-accent) 30%, transparent);
}

.nav-radial .orbit-node svg {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

.nav-radial .orbit-node.active svg { color: var(--sl-accent) }

.nav-radial .orbit-label {
  font-family: var(--sl-font-mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  
  color: var(--sl-muted);
  text-align: center;
  margin-top: var(--sl-space-lg);
  width: 100%;
}

.nav-radial .orbit-label strong {
  color: var(--sl-accent);
  display: block;
  font-size: 10px;
  margin-bottom: 2px;
}

.nav-radial .radial-list {
  width: 100%;
  margin-top: var(--sl-space-lg);
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-radial .radial-item {
  font-family: var(--sl-font-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  
  color: var(--sl-muted);
  padding: 6px var(--sl-space-sm);
  cursor: pointer;
  transition: color 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-radial .radial-item:hover { color: var(--sl-text) }
.nav-radial .radial-item.active { color: var(--sl-accent) }

.nav-radial .radial-item::before {
  content: '';
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.5;
}
</style>

<nav class="nav-radial">
  <div class="orbit-ring">
    <div class="orbit-center">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg>
    </div>
    <!-- nodes positioned around the circle (6 nodes at 60deg intervals) -->
    <div class="orbit-node active" style="top:5%;left:50%">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
    </div>
    <div class="orbit-node" style="top:25%;left:93%">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7z"/></svg>
    </div>
    <div class="orbit-node" style="top:75%;left:93%">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </div>
    <div class="orbit-node" style="top:95%;left:50%">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5"/><circle cx="9" cy="7" r="4"/></svg>
    </div>
    <div class="orbit-node" style="top:75%;left:7%">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <div class="orbit-node" style="top:25%;left:7%">
      <svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
    </div>
  </div>

  <div class="orbit-label">
    <strong>DASHBOARD</strong>
    SECTOR ALPHA // LOCKED
  </div>

  <div class="radial-list">
    <div class="radial-item active">dashboard</div>
    <div class="radial-item">inventory</div>
    <div class="radial-item">analytics</div>
    <div class="radial-item">operators</div>
    <div class="radial-item">settings</div>
    <div class="radial-item">diagnostics</div>
  </div>
</nav>

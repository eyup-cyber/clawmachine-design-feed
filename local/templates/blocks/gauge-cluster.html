<div class="block-gauge-cluster">
<style>
.block-gauge-cluster .gc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--sl-content-gap);
}
.block-gauge-cluster .gc-card {
  background: var(--sl-card);
  border: 1px solid var(--sl-border-color);
  border-radius: var(--sl-border-radius);
  box-shadow: var(--sl-shadow-raised);
  padding: var(--sl-space-md);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--sl-space-sm);
}
.block-gauge-cluster .gc-wrap {
  width: 140px;
  height: 140px;
  position: relative;
}
.block-gauge-cluster .gc-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}
.block-gauge-cluster .gc-track {
  fill: none;
  stroke: var(--sl-surface);
  stroke-width: 12;
  stroke-linecap: round;
}
.block-gauge-cluster .gc-fill {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s ease;
}
.block-gauge-cluster .gc-fill.ok { stroke: var(--sl-accent); }
.block-gauge-cluster .gc-fill.warn { stroke: var(--sl-secondary); }
.block-gauge-cluster .gc-fill.crit {
  stroke: color-mix(in srgb, var(--sl-secondary) 70%, red);
}
.block-gauge-cluster .gc-tick {
  stroke: var(--sl-border-color);
  stroke-width: 1;
}
.block-gauge-cluster .gc-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.block-gauge-cluster .gc-value {
  font-family: var(--sl-font-display);
  font-size: 26px;
  font-weight: 700;
  color: var(--sl-text);
  line-height: 1;
}
.block-gauge-cluster .gc-unit {
  font-family: var(--sl-font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  
  color: var(--sl-muted);
}
.block-gauge-cluster .gc-label {
  font-family: var(--sl-font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  
  color: var(--sl-muted);
  text-align: center;
}
.block-gauge-cluster .gc-sublabel {
  font-family: var(--sl-font-body);
  font-size: 11px;
  color: var(--sl-text);
  opacity: 0.6;
  text-align: center;
}
@media (max-width: 600px) {
  .block-gauge-cluster .gc-grid { grid-template-columns: 1fr; }
}
</style>

<!--
  Each gauge is a 270-degree arc (3/4 circle), distinct from:
  - stats-ring: full 360-deg donut rings, 80x80, thin stroke
  - figma-gauge: 180-deg semicircle arcs, half-height

  These are 270-deg arcs with thick stroke, tick marks, and centered value+unit.
  Arc center=(70,70), r=55. 270deg arc from 135deg to 45deg (clockwise).
  Arc length = (270/360) * 2*pi*55 = 259.18
  dasharray = 259.18, dashoffset = 259.18 * (1 - fraction)
-->
<div class="gc-grid">
  <!-- Gauge 1: CPU Load 73% -->
  <div class="gc-card">
    <div class="gc-wrap">
      <svg class="gc-svg" viewBox="0 0 140 140">
        <!-- tick marks at 0%, 25%, 50%, 75%, 100% around the 270-deg arc -->
        <line class="gc-tick" x1="31.1" y1="108.9" x2="36.6" y2="103.4"/>
        <line class="gc-tick" x1="15" y1="70" x2="22" y2="70"/>
        <line class="gc-tick" x1="31.1" y1="31.1" x2="36.6" y2="36.6"/>
        <line class="gc-tick" x1="70" y1="15" x2="70" y2="22"/>
        <line class="gc-tick" x1="108.9" y1="31.1" x2="103.4" y2="36.6"/>
        <!-- track + fill -->
        <path class="gc-track"
              d="M31.1,108.9 A55,55 0 1,1 108.9,108.9"/>
        <path class="gc-fill warn"
              d="M31.1,108.9 A55,55 0 1,1 108.9,108.9"
              style="stroke-dasharray:259.18; stroke-dashoffset:69.98"/>
      </svg>
      <div class="gc-center">
        <span class="gc-value">73</span>
        <span class="gc-unit">% LOAD</span>
      </div>
    </div>
    <span class="gc-label">CPU</span>
    <span class="gc-sublabel">4 cores / 2.8 GHz</span>
  </div>

  <!-- Gauge 2: Memory 58% -->
  <div class="gc-card">
    <div class="gc-wrap">
      <svg class="gc-svg" viewBox="0 0 140 140">
        <line class="gc-tick" x1="31.1" y1="108.9" x2="36.6" y2="103.4"/>
        <line class="gc-tick" x1="15" y1="70" x2="22" y2="70"/>
        <line class="gc-tick" x1="31.1" y1="31.1" x2="36.6" y2="36.6"/>
        <line class="gc-tick" x1="70" y1="15" x2="70" y2="22"/>
        <line class="gc-tick" x1="108.9" y1="31.1" x2="103.4" y2="36.6"/>
        <path class="gc-track"
              d="M31.1,108.9 A55,55 0 1,1 108.9,108.9"/>
        <path class="gc-fill ok"
              d="M31.1,108.9 A55,55 0 1,1 108.9,108.9"
              style="stroke-dasharray:259.18; stroke-dashoffset:108.86"/>
      </svg>
      <div class="gc-center">
        <span class="gc-value">58</span>
        <span class="gc-unit">% USED</span>
      </div>
    </div>
    <span class="gc-label">MEMORY</span>
    <span class="gc-sublabel">9.3 / 16 GB</span>
  </div>

  <!-- Gauge 3: Network 84% -->
  <div class="gc-card">
    <div class="gc-wrap">
      <svg class="gc-svg" viewBox="0 0 140 140">
        <line class="gc-tick" x1="31.1" y1="108.9" x2="36.6" y2="103.4"/>
        <line class="gc-tick" x1="15" y1="70" x2="22" y2="70"/>
        <line class="gc-tick" x1="31.1" y1="31.1" x2="36.6" y2="36.6"/>
        <line class="gc-tick" x1="70" y1="15" x2="70" y2="22"/>
        <line class="gc-tick" x1="108.9" y1="31.1" x2="103.4" y2="36.6"/>
        <path class="gc-track"
              d="M31.1,108.9 A55,55 0 1,1 108.9,108.9"/>
        <path class="gc-fill crit"
              d="M31.1,108.9 A55,55 0 1,1 108.9,108.9"
              style="stroke-dasharray:259.18; stroke-dashoffset:41.47"/>
      </svg>
      <div class="gc-center">
        <span class="gc-value">84</span>
        <span class="gc-unit">% THR</span>
      </div>
    </div>
    <span class="gc-label">NETWORK</span>
    <span class="gc-sublabel">840 / 1000 Mbps</span>
  </div>
</div>
</div>

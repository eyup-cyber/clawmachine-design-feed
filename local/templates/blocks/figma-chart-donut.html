<div class="block-figma-chart-donut">
<style>
.block-figma-chart-donut .fdonut-panel {
  background: var(--sl-card);
  border: 1px solid var(--sl-border-color);
  border-radius: var(--sl-border-radius);
  box-shadow: var(--sl-shadow-raised);
  overflow: hidden;
}
.block-figma-chart-donut .fdonut-hdr {
  padding: var(--sl-space-md);
  border-bottom: 1px solid var(--sl-border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.block-figma-chart-donut .fdonut-title {
  font-family: var(--sl-font-display);
  font-size: 14px;
  font-weight: 600;
  
  letter-spacing: 0.04em;
}
.block-figma-chart-donut .fdonut-badge {
  font-family: var(--sl-font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  
  padding: 3px 8px;
  border: 1px solid var(--sl-secondary);
  border-radius: var(--sl-border-radius);
  color: var(--sl-secondary);
}
.block-figma-chart-donut .fdonut-body {
  padding: var(--sl-space-lg);
  display: flex;
  align-items: center;
  gap: var(--sl-space-xl);
}
.block-figma-chart-donut .fdonut-ring {
  width: 160px;
  height: 160px;
  flex-shrink: 0;
  position: relative;
}
.block-figma-chart-donut .fdonut-svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.block-figma-chart-donut .fdonut-track {
  fill: none;
  stroke: var(--sl-surface);
  stroke-width: 20;
}
.block-figma-chart-donut .fdonut-seg {
  fill: none;
  stroke-width: 20;
  stroke-linecap: butt;
  transition: opacity 0.2s;
}
.block-figma-chart-donut .fdonut-seg:hover { opacity: 0.75; }
.block-figma-chart-donut .fdonut-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.block-figma-chart-donut .fdonut-value {
  font-family: var(--sl-font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--sl-text);
  line-height: 1;
}
.block-figma-chart-donut .fdonut-sublabel {
  font-family: var(--sl-font-mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  
  color: var(--sl-muted);
  margin-top: 3px;
}
.block-figma-chart-donut .fdonut-legend {
  display: flex;
  flex-direction: column;
  gap: var(--sl-space-sm);
  flex: 1;
}
.block-figma-chart-donut .fdonut-row {
  display: flex;
  align-items: center;
  gap: var(--sl-space-sm);
}
.block-figma-chart-donut .fdonut-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}
.block-figma-chart-donut .fdonut-label {
  font-family: var(--sl-font-body);
  font-size: 12px;
  color: var(--sl-text);
  flex: 1;
}
.block-figma-chart-donut .fdonut-pct {
  font-family: var(--sl-font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--sl-text);
}
.block-figma-chart-donut .fdonut-amt {
  font-family: var(--sl-font-mono);
  font-size: 10px;
  color: var(--sl-muted);
  min-width: 48px;
  text-align: right;
}
@media (max-width: 500px) {
  .block-figma-chart-donut .fdonut-body { flex-direction: column; }
}
</style>

<div class="fdonut-panel">
  <div class="fdonut-hdr">
    <span class="fdonut-title">MACHINE REVENUE MIX</span>
    <span class="fdonut-badge">Q4 2025</span>
  </div>
  <div class="fdonut-body">
    <div class="fdonut-ring">
      <!-- circumference = 2 * pi * 50 = 314.16 -->
      <svg class="fdonut-svg" viewBox="0 0 120 120">
        <circle class="fdonut-track" cx="60" cy="60" r="50"/>
        <!-- claw machines 42%: dash=131.9 -->
        <circle class="fdonut-seg" cx="60" cy="60" r="50" stroke="var(--sl-accent)" style="stroke-dasharray:131.9 182.3; stroke-dashoffset:0"/>
        <!-- prize dispensers 24%: dash=75.4 -->
        <circle class="fdonut-seg" cx="60" cy="60" r="50" stroke="var(--sl-secondary)" style="stroke-dasharray:75.4 238.8; stroke-dashoffset:-131.9"/>
        <!-- arcade cabinets 19%: dash=59.7 -->
        <circle class="fdonut-seg" cx="60" cy="60" r="50" stroke="color-mix(in srgb, var(--sl-accent) 60%, var(--sl-surface))" style="stroke-dasharray:59.7 254.5; stroke-dashoffset:-207.3"/>
        <!-- coin pushers 15%: dash=47.1 -->
        <circle class="fdonut-seg" cx="60" cy="60" r="50" stroke="var(--sl-muted)" style="stroke-dasharray:47.1 267.1; stroke-dashoffset:-267.0"/>
      </svg>
      <div class="fdonut-center">
        <span class="fdonut-value">$312K</span>
        <span class="fdonut-sublabel">REVENUE</span>
      </div>
    </div>

    <div class="fdonut-legend">
      <div class="fdonut-row">
        <span class="fdonut-dot" style="background:var(--sl-accent)"></span>
        <span class="fdonut-label">Claw Machines</span>
        <span class="fdonut-pct">42%</span>
        <span class="fdonut-amt">$131K</span>
      </div>
      <div class="fdonut-row">
        <span class="fdonut-dot" style="background:var(--sl-secondary)"></span>
        <span class="fdonut-label">Prize Dispensers</span>
        <span class="fdonut-pct">24%</span>
        <span class="fdonut-amt">$75K</span>
      </div>
      <div class="fdonut-row">
        <span class="fdonut-dot" style="background:color-mix(in srgb, var(--sl-accent) 60%, var(--sl-surface))"></span>
        <span class="fdonut-label">Arcade Cabinets</span>
        <span class="fdonut-pct">19%</span>
        <span class="fdonut-amt">$59K</span>
      </div>
      <div class="fdonut-row">
        <span class="fdonut-dot" style="background:var(--sl-muted)"></span>
        <span class="fdonut-label">Coin Pushers</span>
        <span class="fdonut-pct">15%</span>
        <span class="fdonut-amt">$47K</span>
      </div>
    </div>
  </div>
</div>
</div>

<div class="block-action-compact">
<style>
.block-action-compact .ac-row {
  display: flex;
  align-items: center;
  gap: var(--sl-space-xs);
  padding: var(--sl-space-sm);
  background: var(--sl-card);
  border: 1px solid var(--sl-border-color);
  border-radius: var(--sl-border-radius);
  box-shadow: var(--sl-shadow-raised);
}
.block-action-compact .ac-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--sl-surface);
  border: 1px solid var(--sl-border-color);
  border-radius: var(--sl-border-radius);
  cursor: pointer;
  transition: all 0.15s;
  color: var(--sl-muted);
}
.block-action-compact .ac-btn:hover {
  border-color: var(--sl-accent);
  color: var(--sl-accent);
}
.block-action-compact .ac-btn svg {
  width: 16px;
  height: 16px;
}
.block-action-compact .ac-btn.primary {
  background: var(--sl-accent);
  border-color: var(--sl-accent);
  color: var(--sl-bg);
}
.block-action-compact .ac-btn.primary:hover {
  box-shadow: 0 0 8px color-mix(in srgb, var(--sl-accent) 40%, transparent);
}
.block-action-compact .ac-btn.danger {
  color: var(--sl-secondary);
  border-color: var(--sl-secondary);
}
.block-action-compact .ac-btn.danger:hover {
  background: var(--sl-secondary);
  color: var(--sl-bg);
}
.block-action-compact .ac-spacer { flex: 1; }
.block-action-compact .ac-divider {
  width: 1px;
  height: 24px;
  background: var(--sl-border-color);
  margin: 0 var(--sl-space-xs);
}
</style>

<div class="ac-row">
  <!-- deploy -->
  <button class="ac-btn primary" title="DEPLOY UPDATE">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
  </button>
  <!-- export -->
  <button class="ac-btn" title="EXPORT DATA">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
  <!-- schedule -->
  <button class="ac-btn" title="SCHEDULE MAINTENANCE">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
  </button>
  <!-- refresh -->
  <button class="ac-btn" title="REFRESH DATA">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
  </button>

  <div class="ac-divider"></div>

  <!-- filter -->
  <button class="ac-btn" title="FILTER">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
  </button>
  <!-- settings -->
  <button class="ac-btn" title="SETTINGS">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </button>

  <div class="ac-spacer"></div>

  <!-- emergency halt -->
  <button class="ac-btn danger" title="EMERGENCY HALT">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
  </button>
</div>
</div>

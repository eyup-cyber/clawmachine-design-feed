<div class="block-heatmap-grid">
<style>
.block-heatmap-grid .hm-panel {
  background: var(--sl-card);
  border: 1px solid var(--sl-border-color);
  border-radius: var(--sl-border-radius);
  box-shadow: var(--sl-shadow-raised);
  overflow: hidden;
}
.block-heatmap-grid .hm-hdr {
  padding: var(--sl-space-sm) var(--sl-space-md);
  border-bottom: 1px solid var(--sl-border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.block-heatmap-grid .hm-title {
  font-family: var(--sl-font-display);
  font-size: 14px;
  font-weight: 600;
  
  letter-spacing: 0.04em;
  color: var(--sl-text);
}
.block-heatmap-grid .hm-subtitle {
  font-family: var(--sl-font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  
  color: var(--sl-muted);
}
.block-heatmap-grid .hm-body {
  padding: var(--sl-space-md);
  overflow-x: auto;
}
.block-heatmap-grid .hm-table {
  display: grid;
  grid-template-columns: 36px repeat(24, 1fr);
  gap: 2px;
  min-width: 520px;
}
.block-heatmap-grid .hm-hour-hdr {
  font-family: var(--sl-font-mono);
  font-size: 7px;
  color: var(--sl-muted);
  text-align: center;
  padding-bottom: 4px;
  letter-spacing: 0.05em;
}
.block-heatmap-grid .hm-day-label {
  font-family: var(--sl-font-mono);
  font-size: 8px;
  color: var(--sl-muted);
  
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 6px;
  height: 16px;
}
.block-heatmap-grid .hm-cell {
  height: 16px;
  border-radius: 2px;
  background: var(--sl-accent);
  transition: opacity 0.15s;
}
.block-heatmap-grid .hm-cell:hover {
  outline: 1px solid var(--sl-text);
  outline-offset: 1px;
}
.block-heatmap-grid .hm-scale {
  display: flex;
  align-items: center;
  gap: var(--sl-space-xs);
  padding-top: var(--sl-space-sm);
  justify-content: flex-end;
}
.block-heatmap-grid .hm-scale-label {
  font-family: var(--sl-font-mono);
  font-size: 8px;
  color: var(--sl-muted);
  letter-spacing: 0.08em;
}
.block-heatmap-grid .hm-scale-box {
  width: 12px;
  height: 12px;
  border-radius: 2px;
  background: var(--sl-accent);
}
</style>

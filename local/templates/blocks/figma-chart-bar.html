<div class="block-figma-chart-bar">
<style>
.block-figma-chart-bar .fbar-panel {
  background: var(--sl-card);
  border: 1px solid var(--sl-border-color);
  border-radius: var(--sl-border-radius);
  box-shadow: var(--sl-shadow-raised);
  overflow: hidden;
}
.block-figma-chart-bar .fbar-hdr {
  padding: var(--sl-space-md);
  border-bottom: 1px solid var(--sl-border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.block-figma-chart-bar .fbar-title {
  font-family: var(--sl-font-display);
  font-size: 14px;
  font-weight: 600;
  
  letter-spacing: 0.04em;
}
.block-figma-chart-bar .fbar-period {
  font-family: var(--sl-font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  
  padding: 3px 8px;
  border: 1px solid var(--sl-accent);
  border-radius: var(--sl-border-radius);
  color: var(--sl-accent);
}
.block-figma-chart-bar .fbar-body {
  padding: var(--sl-space-md);
}
.block-figma-chart-bar .fbar-chart {
  height: 220px;
  position: relative;
}
.block-figma-chart-bar .fbar-svg {
  width: 100%;
  height: 100%;
}
.block-figma-chart-bar .fbar-gridline {
  stroke: var(--sl-border-color);
  stroke-width: 1;
  stroke-dasharray: 4 3;
}
.block-figma-chart-bar .fbar-bar-accent {
  fill: var(--sl-accent);
  opacity: 0.75;
  transition: opacity 0.2s;
}
.block-figma-chart-bar .fbar-bar-accent:hover { opacity: 1; }
.block-figma-chart-bar .fbar-bar-secondary {
  fill: var(--sl-secondary);
  opacity: 0.65;
  transition: opacity 0.2s;
}
.block-figma-chart-bar .fbar-bar-secondary:hover { opacity: 1; }
.block-figma-chart-bar .fbar-axis-label {
  font-family: var(--sl-font-mono);
  font-size: 9px;
  fill: var(--sl-muted);
}
.block-figma-chart-bar .fbar-footer {
  padding: var(--sl-space-sm) var(--sl-space-md);
  border-top: 1px solid var(--sl-border-color);
  display: flex;
  gap: var(--sl-space-md);
}
.block-figma-chart-bar .fbar-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--sl-font-mono);
  font-size: 10px;
  color: var(--sl-muted);
  
  letter-spacing: 0.06em;
}
.block-figma-chart-bar .fbar-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}
</style>

<div class="fbar-panel">
  <div class="fbar-hdr">
    <span class="fbar-title">WEEKLY MACHINE REVENUE</span>
    <span class="fbar-period">7-DAY</span>
  </div>
  <div class="fbar-body">
    <div class="fbar-chart">
      <svg class="fbar-svg" viewBox="0 0 400 180" preserveAspectRatio="none">
        <!-- gridlines -->
        <line class="fbar-gridline" x1="40" y1="10" x2="390" y2="10"/>
        <line class="fbar-gridline" x1="40" y1="52" x2="390" y2="52"/>
        <line class="fbar-gridline" x1="40" y1="94" x2="390" y2="94"/>
        <line class="fbar-gridline" x1="40" y1="136" x2="390" y2="136"/>
        <!-- axis labels -->
        <text class="fbar-axis-label" x="2" y="14">$8K</text>
        <text class="fbar-axis-label" x="2" y="56">$6K</text>
        <text class="fbar-axis-label" x="2" y="98">$4K</text>
        <text class="fbar-axis-label" x="2" y="140">$2K</text>
        <!-- Mon: revenue=$5.2K cost=$1.8K -->
        <rect class="fbar-bar-accent" x="50" y="63" width="18" height="95" rx="2"/>
        <rect class="fbar-bar-secondary" x="70" y="123" width="18" height="35" rx="2"/>
        <!-- Tue: revenue=$6.8K cost=$2.1K -->
        <rect class="fbar-bar-accent" x="100" y="30" width="18" height="128" rx="2"/>
        <rect class="fbar-bar-secondary" x="120" y="114" width="18" height="44" rx="2"/>
        <!-- Wed: revenue=$4.5K cost=$1.5K -->
        <rect class="fbar-bar-accent" x="150" y="78" width="18" height="80" rx="2"/>
        <rect class="fbar-bar-secondary" x="170" y="128" width="18" height="30" rx="2"/>
        <!-- Thu: revenue=$7.3K cost=$2.4K -->
        <rect class="fbar-bar-accent" x="200" y="20" width="18" height="138" rx="2"/>
        <rect class="fbar-bar-secondary" x="220" y="108" width="18" height="50" rx="2"/>
        <!-- Fri: revenue=$8.1K cost=$2.7K -->
        <rect class="fbar-bar-accent" x="250" y="4" width="18" height="154" rx="2"/>
        <rect class="fbar-bar-secondary" x="270" y="102" width="18" height="56" rx="2"/>
        <!-- Sat: revenue=$6.0K cost=$2.0K -->
        <rect class="fbar-bar-accent" x="300" y="46" width="18" height="112" rx="2"/>
        <rect class="fbar-bar-secondary" x="320" y="117" width="18" height="41" rx="2"/>
        <!-- Sun: revenue=$5.6K cost=$1.9K -->
        <rect class="fbar-bar-accent" x="350" y="55" width="18" height="103" rx="2"/>
        <rect class="fbar-bar-secondary" x="370" y="120" width="18" height="38" rx="2"/>
        <!-- day labels -->
        <text class="fbar-axis-label" x="57" y="172">MON</text>
        <text class="fbar-axis-label" x="108" y="172">TUE</text>
        <text class="fbar-axis-label" x="157" y="172">WED</text>
        <text class="fbar-axis-label" x="208" y="172">THU</text>
        <text class="fbar-axis-label" x="261" y="172">FRI</text>
        <text class="fbar-axis-label" x="309" y="172">SAT</text>
        <text class="fbar-axis-label" x="358" y="172">SUN</text>
      </svg>
    </div>
  </div>
  <div class="fbar-footer">
    <span class="fbar-legend-item">
      <span class="fbar-legend-dot" style="background:var(--sl-accent)"></span>
      REVENUE
    </span>
    <span class="fbar-legend-item">
      <span class="fbar-legend-dot" style="background:var(--sl-secondary)"></span>
      OPERATING COST
    </span>
  </div>
</div>
</div>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clawmachine // OPERATOR INTERFACE</title>
<!-- FONT_FACE_BLOCK -->
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  /* colours */
  --sl-bg: #0a0a0f;
  --sl-surface: #141419;
  --sl-card: #1a1a22;
  --sl-accent: #00ff88;
  --sl-secondary: #ff0066;
  --sl-text: #e8e8f0;
  --sl-muted: #6b6b80;

  /* fonts */
  --sl-font-display: 'Space Grotesk', system-ui, sans-serif;
  --sl-font-body: 'Inter', system-ui, sans-serif;
  --sl-font-mono: 'Space Mono', monospace;

  /* spacing */
  --sl-space-xs: 4px;
  --sl-space-sm: 8px;
  --sl-space-md: 16px;
  --sl-space-lg: 24px;
  --sl-space-xl: 40px;

  /* surfaces */
  --sl-shadow-raised: 0 2px 8px rgba(0,0,0,0.25);
  --sl-shadow-inset: inset 0 2px 4px rgba(0,0,0,0.2);
  --sl-border-radius: 3px;
  --sl-border-color: color-mix(in srgb, var(--sl-text) 12%, transparent);

  /* layout */
  --sl-grid-template: 'sidebar header' auto 'sidebar main' 1fr 'sidebar footer' auto / var(--sl-sidebar-width) 1fr;
  --sl-sidebar-width: 220px;
  --sl-content-gap: 12px;
}

html { scroll-behavior: smooth }

body {
  background: var(--sl-bg);
  color: var(--sl-text);
  font-family: var(--sl-font-body);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

.shell {
  display: grid;
  grid-template: var(--sl-grid-template);
  min-height: 100vh;
}

/* === HEADER === */
.hdr {
  grid-area: header;
  background: var(--sl-surface);
  border-bottom: 1px solid var(--sl-border-color);
  padding: 0 var(--sl-space-lg);
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
}
.hdr-brand {
  font-family: var(--sl-font-mono); font-size:11px; font-weight:700;
  letter-spacing:0.2em;  color:var(--sl-accent);
}
.hdr-brand span { color:var(--sl-muted); font-weight:400; }
.hdr-actions { display:flex; align-items:center; gap:var(--sl-space-md); }
.hdr-status {
  font-family:var(--sl-font-mono); font-size:10px; letter-spacing:0.08em;
  color:var(--sl-muted); 
}
.hdr-status .live-dot {
  display:inline-block; width:6px; height:6px; background:var(--sl-accent);
  border-radius:50%; margin-right:var(--sl-space-xs); animation:pulse-dot 2s ease infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
.hdr-btn {
  font-family:var(--sl-font-mono); font-size:10px; letter-spacing:0.08em;
   padding:6px 14px; background:transparent;
  border:1px solid var(--sl-border-color); border-radius:var(--sl-border-radius);
  color:var(--sl-text); cursor:pointer; transition:border-color 0.2s, color 0.2s;
}
.hdr-btn:hover { border-color:var(--sl-accent); color:var(--sl-accent); }

/* === SIDEBAR (placeholder — NAV_BLOCK replaces) === */
.sidebar {
  grid-area: sidebar;
  background: var(--sl-surface);
  border-right: 1px solid var(--sl-border-color);
  padding: var(--sl-space-md) 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  width: var(--sl-sidebar-width);
}

/* === DATA-HEAVY MAIN === */
.main {
  grid-area: main;
  padding: var(--sl-space-md);
  overflow-y: auto;
  display: grid;
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr;
  gap: var(--sl-content-gap);
}

/* secondary is a narrow stats strip above the table */
.zone-secondary {
  display: flex;
  gap: var(--sl-content-gap);
  flex-wrap: wrap;
}

/* primary is the dominant table zone */
.zone-primary {
  display: flex;
  flex-direction: column;
  gap: var(--sl-content-gap);
  min-height: 0;
}

/* === FOOTER === */
.ftr {
  grid-area: footer;
  background: var(--sl-surface);
  border-top: 1px solid var(--sl-border-color);
  padding: 0 var(--sl-space-lg);
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--sl-font-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  
  color: var(--sl-muted);
}
.ftr-left, .ftr-right { display:flex; align-items:center; gap:var(--sl-space-md); }
.ftr-indicator { display:flex; align-items:center; gap:4px; }
.ftr-indicator::before { content:''; width:4px; height:4px; border-radius:50%; background:var(--sl-accent); }
.ftr-indicator.warn::before { background:var(--sl-secondary); }

/* TEXTURE_BLOCK */

@media (max-width: 768px) {
  .shell { grid-template: 'header' auto 'main' 1fr 'footer' auto / 1fr; }
  .sidebar { display: none; }
}
</style>
</head>
<body>
<div class="shell">

  <header class="hdr">
    <div class="hdr-brand">clawmachine <span>// DATA VIEW</span></div>
    <div class="hdr-actions">
      <span class="hdr-status"><span class="live-dot"></span>LIVE</span>
      <button class="hdr-btn">EXPORT</button>
      <button class="hdr-btn">FILTER</button>
    </div>
  </header>

  <!-- NAV_BLOCK_START -->
  <!-- NAV_BLOCK_END -->

  <main class="main">
    <div class="zone-secondary">
      <!-- ZONE:secondary -->
    </div>
    <div class="zone-primary">
      <!-- ZONE:primary -->
    </div>
  </main>

  <!-- DECORATIVE_BLOCK -->

  <footer class="ftr">
    <div class="ftr-left">
      <span class="ftr-indicator">OPERATIONAL</span>
      <span>UPTIME: 99.97%</span>
      <span>LATENCY: 12MS</span>
    </div>
    <div class="ftr-right">
      <span>NODES: 142/145</span>
      <span>LAST SYNC: 2 MIN AGO</span>
      <span class="ftr-indicator warn">1 ALERT PENDING</span>
    </div>
  </footer>

</div>
</body>
</html>

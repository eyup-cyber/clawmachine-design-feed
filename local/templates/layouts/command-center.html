<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clawmachine // OPERATOR INTERFACE</title>
<!-- FONT_FACE_BLOCK -->
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  /* colours */
  --sl-bg: #0a0a0f;
  --sl-surface: #141419;
  --sl-card: #1a1a22;
  --sl-accent: #00ff88;
  --sl-secondary: #ff0066;
  --sl-text: #e8e8f0;
  --sl-muted: #6b6b80;

  /* fonts */
  --sl-font-display: 'Space Grotesk', system-ui, sans-serif;
  --sl-font-body: 'Inter', system-ui, sans-serif;
  --sl-font-mono: 'Space Mono', monospace;

  /* spacing */
  --sl-space-xs: 4px;
  --sl-space-sm: 8px;
  --sl-space-md: 16px;
  --sl-space-lg: 24px;
  --sl-space-xl: 40px;

  /* surfaces */
  --sl-shadow-raised: 0 2px 8px rgba(0,0,0,0.25);
  --sl-shadow-inset: inset 0 2px 4px rgba(0,0,0,0.2);
  --sl-border-radius: 3px;
  --sl-border-color: color-mix(in srgb, var(--sl-text) 12%, transparent);

  /* layout */
  --sl-grid-template: 'sidebar header header' auto 'sidebar left right' 1fr 'sidebar bottom bottom' auto 'sidebar footer footer' auto / 56px 1fr 1fr;
  --sl-sidebar-width: 56px;
  --sl-content-gap: 10px;
}

html { scroll-behavior: smooth }

body {
  background: var(--sl-bg);
  color: var(--sl-text);
  font-family: var(--sl-font-body);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

.shell {
  display: grid;
  grid-template: var(--sl-grid-template);
  min-height: 100vh;
}

/* === HEADER === */
.hdr {
  grid-area: header;
  background: var(--sl-surface);
  border-bottom: 1px solid var(--sl-border-color);
  padding: 0 var(--sl-space-lg);
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
}
.hdr-brand {
  font-family: var(--sl-font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  
  color: var(--sl-accent);
}
.hdr-brand span { color: var(--sl-muted); font-weight: 400; }
.hdr-actions { display: flex; align-items: center; gap: var(--sl-space-md); }
.hdr-status {
  font-family: var(--sl-font-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--sl-muted);
  
}
.hdr-status .live-dot {
  display: inline-block; width:6px; height:6px;
  background: var(--sl-accent); border-radius:50%;
  margin-right: var(--sl-space-xs);
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
.hdr-btn {
  font-family: var(--sl-font-mono); font-size:10px; letter-spacing:0.08em;
   padding:5px 12px; background:transparent;
  border:1px solid var(--sl-border-color); border-radius:var(--sl-border-radius);
  color: var(--sl-text); cursor:pointer; transition:border-color 0.2s, color 0.2s;
}
.hdr-btn:hover { border-color:var(--sl-accent); color:var(--sl-accent); }

/* === SIDEBAR RAIL === */
.sidebar {
  grid-area: sidebar;
  background: var(--sl-surface);
  border-right: 1px solid var(--sl-border-color);
  width: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--sl-space-sm) 0;
}

/* === DENSE 2-PANEL SPLIT === */
.zone-primary {
  grid-area: left;
  padding: var(--sl-space-sm);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: var(--sl-content-gap);
}
.zone-secondary {
  grid-area: right;
  padding: var(--sl-space-sm);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: var(--sl-content-gap);
}
.zone-tertiary {
  grid-area: bottom;
  padding: 0 var(--sl-space-sm) var(--sl-space-sm);
  display: flex;
  flex-direction: column;
  gap: var(--sl-content-gap);
}
.zone-quaternary {
  display: none; /* injected inside tertiary as needed */
}

/* status bar strip above footer */
.cmd-status {
  padding: var(--sl-space-xs) var(--sl-space-sm);
  background: var(--sl-bg);
  border-top: 1px solid var(--sl-border-color);
  border-bottom: 1px solid var(--sl-border-color);
  display: flex;
  align-items: center;
  gap: var(--sl-space-md);
  font-family: var(--sl-font-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  
  color: var(--sl-muted);
  overflow-x: auto;
}
.cmd-status-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--sl-accent);
  flex-shrink: 0;
}

/* === FOOTER === */
.ftr {
  grid-area: footer;
  background: var(--sl-surface);
  border-top: 1px solid var(--sl-border-color);
  padding: 0 var(--sl-space-lg);
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--sl-font-mono);
  font-size: 8px;
  letter-spacing: 0.08em;
  
  color: var(--sl-muted);
}
.ftr-left, .ftr-right { display: flex; align-items: center; gap: var(--sl-space-md); }
.ftr-indicator { display: flex; align-items: center; gap: 4px; }
.ftr-indicator::before { content:''; width:4px; height:4px; border-radius:50%; background:var(--sl-accent); }
.ftr-indicator.warn::before { background:var(--sl-secondary); }

/* TEXTURE_BLOCK */

@media (max-width: 768px) {
  .shell {
    grid-template: 'header' auto 'left' 1fr 'right' 1fr 'bottom' auto 'footer' auto / 1fr;
  }
  .sidebar { display: none; }
  .zone-primary, .zone-secondary { padding: var(--sl-space-sm); }
}
</style>
</head>
<body>
<div class="shell">

  <header class="hdr">
    <div class="hdr-brand">clawmachine <span>// COMMAND CENTER</span></div>
    <div class="hdr-actions">
      <span class="hdr-status"><span class="live-dot"></span>ALL SYSTEMS NOMINAL</span>
      <button class="hdr-btn">EXPORT</button>
    </div>
  </header>

  <!-- NAV_BLOCK_START -->
  <!-- NAV_BLOCK_END -->

  <div class="zone-primary">
    <!-- ZONE:primary -->
  </div>

  <div class="zone-secondary">
    <!-- ZONE:secondary -->
  </div>

  <div class="zone-tertiary">
    <!-- ZONE:tertiary -->
    <!-- ZONE:quaternary -->
  </div>

  <!-- DECORATIVE_BLOCK -->

  <footer class="ftr">
    <div class="ftr-left">
      <span class="ftr-indicator">OPERATIONAL</span>
      <span>UPTIME: 99.97%</span>
      <span>12MS</span>
    </div>
    <div class="ftr-right">
      <span>142/145 NODES</span>
      <span class="ftr-indicator warn">1 ALERT</span>
    </div>
  </footer>

</div>
</body>
</html>

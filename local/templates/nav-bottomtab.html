<!-- NAV VARIANT: BOTTOMTAB — fixed bottom tab bar, mobile-first aesthetic -->
<style>
.nav-bottomtab {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: var(--sl-surface);
  border-top: 1px solid var(--sl-border-color);
  display: flex;
  align-items: center;
  justify-content: space-around;
  height: 56px;
  padding: 0 var(--sl-space-md);
  backdrop-filter: blur(12px);
}

.nav-bottomtab .tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 12px;
  cursor: pointer;
  transition: color 0.15s;
  color: var(--sl-muted);
  text-decoration: none;
  position: relative;
}

.nav-bottomtab .tab-item:hover {
  color: var(--sl-text);
}

.nav-bottomtab .tab-item.active {
  color: var(--sl-accent);
}

.nav-bottomtab .tab-item.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 25%;
  right: 25%;
  height: 2px;
  background: var(--sl-accent);
  border-radius: 0 0 2px 2px;
}

.nav-bottomtab .tab-item svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

.nav-bottomtab .tab-label {
  font-family: var(--sl-font-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  
}

.nav-bottomtab .tab-center {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--sl-accent);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: -16px;
  box-shadow: 0 2px 12px color-mix(in srgb, var(--sl-accent) 30%, transparent);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.nav-bottomtab .tab-center:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 20px color-mix(in srgb, var(--sl-accent) 50%, transparent);
}

.nav-bottomtab .tab-center svg {
  width: 22px;
  height: 22px;
  stroke: var(--sl-bg);
  fill: none;
  stroke-width: 2;
}

/* body needs bottom padding when this nav is active */
.shell--bottomtab .main {
  padding-bottom: 72px;
}

.shell--bottomtab .ftr {
  bottom: 56px;
}
</style>

<nav class="nav-bottomtab">
  <a class="tab-item active">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
    <span class="tab-label">DASH</span>
  </a>
  <a class="tab-item">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7z"/></svg>
    <span class="tab-label">STOCK</span>
  </a>
  <a class="tab-center">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
  </a>
  <a class="tab-item">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5"/><circle cx="9" cy="7" r="4"/></svg>
    <span class="tab-label">OPS</span>
  </a>
  <a class="tab-item">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></svg>
    <span class="tab-label">GEAR</span>
  </a>
</nav>

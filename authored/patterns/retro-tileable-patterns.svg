    <rect x="860" y="920" width="260" height="80" fill="url(#dither-threshold)"/>  <text x="860" y="1010" font-size="10" fill="#888">36. dither-threshold</text>

    <rect x="20"  y="1030" width="260" height="80" fill="url(#ruler)"/>            <text x="20"  y="1120" font-size="10" fill="#888">37. ruler</text>
    <rect x="300" y="1030" width="260" height="80" fill="url(#steps)"/>            <text x="300" y="1120" font-size="10" fill="#888">38. steps</text>
    <rect x="580" y="1030" width="260" height="80" fill="url(#hash-ascii)"/>       <text x="580" y="1120" font-size="10" fill="#888">39. hash-ascii</text>

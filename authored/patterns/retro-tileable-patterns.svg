    <rect x="300" y="260" width="260" height="80" fill="url(#dots-4)"/>            <text x="300" y="350" font-size="10" fill="#888">10. dots-4</text>
    <rect x="580" y="260" width="260" height="80" fill="url(#dots-16)"/>           <text x="580" y="350" font-size="10" fill="#888">11. dots-16</text>
    <rect x="860" y="260" width="260" height="80" fill="url(#stripe-45-2)"/>       <text x="860" y="350" font-size="10" fill="#888">12. stripe-45-2</text>

    <rect x="20"  y="370" width="260" height="80" fill="url(#stripe-45-4)"/>       <text x="20"  y="460" font-size="10" fill="#888">13. stripe-45-4</text>
    <rect x="300" y="370" width="260" height="80" fill="url(#stripe-m45-2)"/>      <text x="300" y="460" font-size="10" fill="#888">14. stripe-m45-2</text>
    <rect x="580" y="370" width="260" height="80" fill="url(#crosshatch)"/>        <text x="580" y="460" font-size="10" fill="#888">15. crosshatch</text>
    <rect x="860" y="370" width="260" height="80" fill="url(#chevron)"/>           <text x="860" y="460" font-size="10" fill="#888">16. chevron</text>

    <rect x="20"  y="480" width="260" height="80" fill="url(#zigzag)"/>            <text x="20"  y="570" font-size="10" fill="#888">17. zigzag</text>
    <rect x="300" y="480" width="260" height="80" fill="url(#herringbone)"/>       <text x="300" y="570" font-size="10" fill="#888">18. herringbone</text>
    <rect x="580" y="480" width="260" height="80" fill="url(#circuit-h)"/>         <text x="580" y="570" font-size="10" fill="#888">19. circuit-h</text>
    <rect x="860" y="480" width="260" height="80" fill="url(#circuit-grid)"/>     <text x="860" y="570" font-size="10" fill="#888">20. circuit-grid</text>

    <rect x="20"  y="590" width="260" height="80" fill="url(#iso-grid)"/>          <text x="20"  y="680" font-size="10" fill="#888">21. iso-grid</text>

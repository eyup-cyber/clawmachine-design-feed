    <rect x="580" y="590" width="260" height="80" fill="url(#tri-up)"/>            <text x="580" y="680" font-size="10" fill="#888">23. tri-up</text>
    <rect x="860" y="590" width="260" height="80" fill="url(#diamond-s)"/>         <text x="860" y="680" font-size="10" fill="#888">24. diamond-s</text>

    <rect x="20"  y="700" width="260" height="80" fill="url(#plus)"/>              <text x="20"  y="790" font-size="10" fill="#888">25. plus</text>
    <rect x="300" y="700" width="260" height="80" fill="url(#cross-dot)"/>         <text x="300" y="790" font-size="10" fill="#888">26. cross-dot</text>

    <rect x="860" y="40"  width="260" height="80" fill="url(#scanline-h)"/>        <text x="860" y="130" font-size="10" fill="#888">4. scanline-h</text>

    <rect x="20"  y="150" width="260" height="80" fill="url(#scanline-v)"/>        <text x="20"  y="240" font-size="10" fill="#888">5. scanline-v</text>

    <rect x="1" y="0" width="1" height="3"/>
    <rect x="5" y="2" width="1" height="4"/>
    <rect x="9" y="5" width="1" height="3"/>
    <rect x="3" y="7" width="1" height="4"/>
    <rect x="7" y="9" width="1" height="3"/>
    <rect x="11" y="1" width="1" height="2"/>
  </g>
